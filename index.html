<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Wildrose — Lead Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;--surface:#0d0d14;--card:#12121c;--border:#1c1c2e;
  --text:#f0f0f8;--muted:#4a4a6a;--dim:#2a2a3e;
  --gold:#d4a843;--gold2:#f0c060;--gold-dim:rgba(212,168,67,.12);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --green-dim:rgba(34,197,94,.1);--red-dim:rgba(239,68,68,.1);--blue-dim:rgba(59,130,246,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text{font-size:.95rem;font-weight:800}
.logo-sub{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.nav-tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
.tab{padding:5px 14px;border-radius:7px;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--gold);color:#000}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:8px;font-size:.58rem;font-weight:700;padding:1px 5px;margin-left:4px;min-width:16px;line-height:1.4}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:.72rem;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.page{display:none;flex:1;overflow-y:auto;flex-direction:column}
.page.active{display:flex}

/* ── DASHBOARD ── */
#pg-dash{padding:16px;gap:14px}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.stat-row{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-val{font-size:1.9rem;font-weight:800;line-height:1}
.stat-sub{font-size:.7rem;color:var(--muted);margin-top:5px}
.stat.gold-stat{border-color:rgba(212,168,67,.3);background:linear-gradient(135deg,var(--card) 0%,rgba(212,168,67,.05) 100%)}
.stat.gold-stat .stat-val{color:var(--gold)}
.section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.activity-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.activity-item:hover{border-color:var(--gold)}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.act-text{flex:1;font-size:.8rem}
.act-time{font-size:.65rem;color:var(--muted)}

/* ── PIPELINE ── */
#pg-pipeline{flex-direction:row;overflow-x:auto;padding:16px;gap:12px;align-items:flex-start}
.pipe-col{flex-shrink:0;width:280px;display:flex;flex-direction:column;gap:8px}
.pipe-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:4px}
.pipe-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.pipe-count-badge{font-size:.68rem;font-weight:700;background:var(--dim);color:var(--muted);padding:2px 8px;border-radius:10px}
.lead-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.lead-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.lead-card.replied{border-left:3px solid var(--gold)}
.lead-company{font-size:.88rem;font-weight:700;margin-bottom:3px}
.lead-name{font-size:.74rem;color:var(--muted);margin-bottom:8px}
.ind-tag{display:inline-block;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:6px;margin-bottom:8px}
.ind-trades{background:rgba(251,146,60,.1);color:#fb923c}
.ind-law{background:rgba(168,85,247,.1);color:#a855f7}
.ind-real_estate{background:var(--blue-dim);color:var(--blue)}
.ind-services{background:var(--green-dim);color:var(--green)}
.ind-inbound{background:var(--gold-dim);color:var(--gold)}
.ind-default{background:var(--dim);color:var(--muted)}
.lead-footer{display:flex;align-items:center;justify-content:space-between}
.lead-date{font-size:.65rem;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%}

/* ── REPLIES ── */
#pg-replies{padding:14px;gap:8px}
.reply-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.reply-card.unread{border-left:3px solid var(--gold)}
.reply-row{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.reply-row:hover{background:var(--surface)}
.avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0;background:var(--gold-dim);color:var(--gold)}
.reply-info{flex:1;min-width:0}
.reply-from{font-size:.88rem;font-weight:700;margin-bottom:2px}
.reply-company{font-size:.72rem;color:var(--gold);margin-bottom:2px}
.reply-preview{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reply-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.reply-time{font-size:.65rem;color:var(--muted)}
.unread-pip{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.reply-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.reply-body.open{display:block}
.reply-text{font-size:.82rem;line-height:1.6;color:#ccc;padding:12px;background:var(--bg);border-radius:8px;margin:12px 0;white-space:pre-wrap}
.reply-actions{display:flex;gap:8px;flex-wrap:wrap}
.r-btn{flex:1;min-width:80px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.73rem;cursor:pointer;font-weight:600;transition:all .15s}
.r-btn:hover{background:var(--dim)}
.r-btn.gold{background:var(--gold);border-color:var(--gold);color:#000}
.r-btn.green{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.r-btn.red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.r-btn.blue{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

/* ── CALLS ── */
#pg-calls{padding:14px;gap:12px}
.add-bar{display:flex;gap:8px}
.add-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:.85rem;outline:none}
.add-input:focus{border-color:var(--gold)}
.add-input::placeholder{color:var(--muted)}
.add-btn{background:var(--gold);color:#000;border:none;padding:10px 18px;border-radius:10px;font-size:.82rem;cursor:pointer;font-weight:700}
.call-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
.call-card.done{opacity:.45}
.call-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0}
.call-dot.done{background:var(--green)}
.call-info{flex:1}
.call-name{font-size:.9rem;font-weight:700;margin-bottom:2px}
.call-detail{font-size:.75rem;color:var(--muted)}
.call-acts{display:flex;gap:6px}
.call-act{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:.72rem;cursor:pointer}
.call-act:hover{background:var(--dim);color:var(--text)}
.call-act.done-act{color:var(--green);border-color:var(--green)}

/* ── LEAD PROFILE MODAL ── */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal.show{display:flex}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:20px 20px 0;flex-shrink:0}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;margin-top:-4px}
.modal-company{font-size:1.2rem;font-weight:800;margin-bottom:2px}
.modal-sub{font-size:.78rem;color:var(--muted)}
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-top:16px;padding:0 20px;flex-shrink:0}
.modal-tab{padding:10px 14px;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.modal-tab.active{color:var(--gold);border-color:var(--gold)}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px 20px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.profile-field{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.pf-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.pf-val{font-size:.85rem;font-weight:600}
.status-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.status-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:.73rem;cursor:pointer;font-weight:600;transition:all .15s}
.status-pill:hover{background:var(--dim)}
.status-pill.active-pill{background:var(--gold);border-color:var(--gold);color:#000}
.convo-msg{padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:.8rem;line-height:1.5}
.convo-msg.out{background:var(--gold-dim);border:1px solid rgba(212,168,67,.2);border-radius:10px 10px 2px 10px}
.convo-msg.in{background:var(--card);border:1px solid var(--border);border-radius:10px 10px 10px 2px}
.convo-meta{font-size:.65rem;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.convo-dir{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:4px}
.convo-dir.out{background:var(--gold-dim);color:var(--gold)}
.convo-dir.in{background:var(--blue-dim);color:var(--blue)}
.analytics-row{display:flex;gap:10px;margin-bottom:12px}
.analytics-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.analytics-val{font-size:1.4rem;font-weight:800;margin-bottom:4px}
.analytics-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.call-req-card{background:var(--card);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:14px;margin-bottom:10px}
.call-req-tag{font-size:.65rem;font-weight:700;text-transform:uppercase;background:var(--green-dim);color:var(--green);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:8px}
.reply-compose{margin-top:12px}
.reply-compose textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-size:.82rem;resize:vertical;min-height:80px;outline:none;font-family:inherit}
.reply-compose textarea:focus{border-color:var(--gold)}
.reply-compose-btn{margin-top:8px;width:100%;background:var(--gold);color:#000;border:none;padding:10px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer}

/* EMPTY + TOAST */
.empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:.85rem}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:.82rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">🌹</div>
    <div>
      <div class="logo-text">Wildrose</div>
      <div class="logo-sub">Lead Manager</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="tab active" onclick="nav('dash',this)">Overview</button>
    <button class="tab" onclick="nav('pipeline',this)">Pipeline</button>
    <button class="tab" onclick="nav('replies',this)">Replies <span class="badge" id="replyBadge" style="display:none">0</span></button>
    <button class="tab" onclick="nav('calls',this)">Calls</button>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="loadAll()">↻</button>
  </div>
</nav>

<div class="page active" id="pg-dash"></div>
<div class="page" id="pg-pipeline"></div>
<div class="page" id="pg-replies"></div>
<div class="page" id="pg-calls">
  <div style="padding:14px">
    <div class="add-bar" style="margin-bottom:12px">
      <input class="add-input" id="callInput" placeholder="Add call — e.g. Jason @ Abacus, Thu 2pm"/>
      <button class="add-btn" onclick="addCall()">+ Add</button>
    </div>
    <div id="callList"></div>
  </div>
</div>

<!-- LEAD PROFILE MODAL -->
<div id="modal">
  <div class="modal-sheet">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-company" class="modal-company"></div>
      <div id="modal-sub" class="modal-sub"></div>
      <div class="modal-tabs">
        <div class="modal-tab active" onclick="modalTab('profile',this)">Profile</div>
        <div class="modal-tab" onclick="modalTab('conversations',this)">Conversations</div>
        <div class="modal-tab" onclick="modalTab('analytics',this)">Analytics</div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB = 'https://xacehhtgvubcqdoltazg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhY2VoaHRndnViY3Fkb2x0YXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDI4NjcsImV4cCI6MjA4OTUxODg2N30.GGS5D4RLLkMdMn17GIBgjHkEn6d-HH9AXIzTBwSAzv8';
const AM_KEY = 'am_us_eb590201635e5a67541a0e4c6eb32c5d6b144eb5cf48a5ca7ce9bece7940c11f';
const AM_INBOXES = [
  'jack@wildroseautomations.ca',
  'lena@wildroseautomations.ca',
  'brad@wildroseautomations.ca',
  'kate@wildroseautomations.ca',
  'cole@wildroseautomations.ca',
  'emma@wildroseautomations.ca',
  'mike@wildroseautomations.ca',
  'sarah@wildroseautomations.ca',
  'ryan@wildroseautomations.ca',
  'hudson@wildroseautomations.ca'
];
const AM_INBOX = AM_INBOXES[0]; // default send-from inbox

let leads=[], replies=[], conversations=[], calls=JSON.parse(localStorage.getItem('wr_calls')||'[]');
let currentLead=null, currentModalTab='profile';

const STATUS_COLORS={contacted:'#3b82f6',replied:'#d4a843',booked:'#22c55e',bounced:'#ef4444',dead:'#4a4a6a'};
const STATUS_ORDER=['booked','replied','contacted','bounced','dead'];

function sbFetch(path){
  return fetch(SB+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(r=>r.json());
}
function sbPatch(path,body){
  return fetch(SB+'/rest/v1/'+path,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
}

function nav(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='pipeline') renderPipeline();
  else if(page==='replies') renderReplies();
  else if(page==='dash') renderDash();
  else if(page==='calls') renderCalls();
}

async function loadAll(){
  toast('Refreshing...');
  await Promise.all([
    sbFetch('leads?order=contacted_at.desc&limit=200').then(d=>{leads=Array.isArray(d)?d:[];}),
    sbFetch('conversations?order=sent_at.desc&limit=500').then(d=>{conversations=Array.isArray(d)?d:[];}),
    Promise.all(AM_INBOXES.map(inbox=>
      fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/messages?limit=100`,
        {headers:{'Authorization':'Bearer '+AM_KEY}})
        .then(r=>r.json())
        .then(d=>(d.messages||[]).map(m=>({...m,_inbox:inbox})))
        .catch(()=>[])
    )).then(results=>{
        const all=results.flat();
        replies=all.filter(m=>(m.labels||[]).includes('received')&&!(m.from||'').includes('mailer-daemon'));
        const unread=replies.filter(m=>(m.labels||[]).includes('unread')).length;
        const badge=document.getElementById('replyBadge');
        badge.style.display=unread>0?'':'none';
        badge.textContent=unread;
      })
  ]);
  const active=document.querySelector('.page.active').id.replace('pg-','');
  if(active==='pipeline') renderPipeline();
  else if(active==='replies') renderReplies();
  else if(active==='dash') renderDash();
  toast('Updated ✓');
}

// ── DASHBOARD ──
function renderDash(){
  const total=leads.length;
  const replied=leads.filter(l=>l.status==='replied'||l.last_reply_at).length;
  const booked=leads.filter(l=>l.status==='booked').length;
  const bounced=leads.filter(l=>l.status==='bounced').length;
  const replyRate=total>0?Math.round(replied/total*100):0;
  const callsBooked=leads.filter(l=>l.status==='booked');

  document.getElementById('pg-dash').innerHTML=`
    <div style="padding:16px;display:flex;flex-direction:column;gap:14px">
      <div class="stat-row">
        <div class="stat gold-stat"><div class="stat-lbl">Total Sent</div><div class="stat-val">${total}</div><div class="stat-sub">all time</div></div>
        <div class="stat"><div class="stat-lbl">Replied</div><div class="stat-val" style="color:var(--gold)">${replied}</div><div class="stat-sub">${replyRate}% rate</div></div>
        <div class="stat"><div class="stat-lbl">Booked</div><div class="stat-val" style="color:var(--green)">${booked}</div><div class="stat-sub">calls scheduled</div></div>
        <div class="stat"><div class="stat-lbl">Bounced</div><div class="stat-val" style="color:var(--red)">${bounced}</div><div class="stat-sub">bad emails</div></div>
      </div>

      ${callsBooked.length>0?`
      <div>
        <div class="section-label" style="margin-bottom:10px">📞 Booked Calls</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${callsBooked.map(l=>`
            <div class="activity-item" onclick="showLead(${l.id})" style="border-color:rgba(34,197,94,.3)">
              <div class="act-dot" style="background:var(--green)"></div>
              <div class="act-text"><strong>${l.company||l.email}</strong>${l.name?' · '+l.name:''}</div>
              <div style="font-size:.7rem;background:var(--green-dim);color:var(--green);padding:3px 8px;border-radius:6px">Call Booked</div>
            </div>`).join('')}
        </div>
      </div>`:''}

      <div>
        <div class="section-label" style="margin-bottom:10px">Pipeline</div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          ${STATUS_ORDER.map(s=>{
            const count=leads.filter(l=>l.status===s).length;
            const pct=total>0?Math.round(count/total*100):0;
            return`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="document.querySelector('[onclick*=pipeline]').click()">
              <div style="width:8px;height:8px;border-radius:50%;background:${STATUS_COLORS[s]||'#555'};flex-shrink:0"></div>
              <div style="flex:1;font-size:.82rem;text-transform:capitalize">${s}</div>
              <div style="flex:2;height:4px;background:var(--dim);border-radius:2px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${STATUS_COLORS[s]||'#555'};border-radius:2px"></div>
              </div>
              <div style="font-size:.82rem;font-weight:700;width:24px;text-align:right">${count}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div>
        <div class="section-label" style="margin-bottom:10px">Recent Activity</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${leads.slice(0,10).map(l=>`
            <div class="activity-item" onclick="showLead(${l.id})">
              <div class="act-dot" style="background:${STATUS_COLORS[l.status]||'#555'}"></div>
              <div class="act-text"><strong>${l.company||l.email}</strong>${l.name&&l.company?' · '+l.name:''}</div>
              <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;background:var(--dim);color:var(--muted)">${l.status}</div>
              <div class="act-time">${timeAgo(l.contacted_at)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── PIPELINE ──

// ── REPLIES ──
function renderReplies(){
  if(!replies.length){
    document.getElementById('pg-replies').innerHTML=`<div class="empty"><div class="empty-icon">📭</div>No replies yet</div>`;
    return;
  }
  document.getElementById('pg-replies').innerHTML=replies.map(m=>{
    const unread=(m.labels||[]).includes('unread');
    const fromName=(m.from||'').replace(/<.*>/,'').trim()||'Unknown';
    const lead=leads.find(l=>l.thread_id===m.thread_id);
    const timeStr=m.timestamp?new Date(m.timestamp).toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    const wantsCall=(m.preview||'').toLowerCase().match(/call|number|phone|reach|available|schedule/);
    const id=m.message_id.replace(/[^a-z0-9]/gi,'_');
    return`<div class="reply-card ${unread?'unread':''}" id="r_${id}">
      <div class="reply-row" onclick="toggleReply('${id}')">
        <div class="avatar">${fromName.slice(0,2).toUpperCase()}</div>
        <div class="reply-info">
          <div class="reply-from">${fromName}</div>
          ${lead?`<div class="reply-company">${lead.company||lead.email}</div>`:''}
          <div class="reply-preview">${wantsCall?'📞 ':''} ${m.preview||m.subject||''}</div>
        </div>
        <div class="reply-meta">
          <div class="reply-time">${timeStr}</div>
          <div style="font-size:.58rem;color:var(--muted);margin-top:2px">${(m._inbox||'').split('@')[0]}</div>
          ${unread?`<div class="unread-pip"></div>`:''}
        </div>
      </div>
      <div class="reply-body" id="rb_${id}">
        ${wantsCall?`<div style="background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;margin-top:12px;font-size:.78rem;color:var(--green)">📞 Wants a call — check their message for number/time</div>`:''}
        <div class="reply-text">${(m.preview||'').slice(0,800)}</div>
        <div style="font-size:.7rem;color:var(--muted);margin-bottom:10px">From: ${m.from} · ${m.subject||''}</div>
        <div class="reply-actions">
          ${lead?`
          <button class="r-btn green" onclick="updateStatus(${lead.id},'booked',this)">✅ Booked</button>
          <button class="r-btn blue" onclick="showLead(${lead.id})">👤 Profile</button>
          <button class="r-btn red" onclick="updateStatus(${lead.id},'dead',this)">❌ Dead</button>
          `:''}
          <button class="r-btn gold" onclick="openReply('${(m.from||'').replace(/'/g,"\\'")}','${(m.subject||'').replace(/'/g,"\\'")}','${m.thread_id}','${id}')">↩ Reply</button>
        </div>
        <div id="compose_${id}" style="display:none" class="reply-compose">
          <div style="font-size:.65rem;color:var(--muted);margin-bottom:6px">Replying from: <strong style="color:var(--gold)">${m._inbox||AM_INBOX}</strong></div>
          <textarea id="replytext_${id}" placeholder="Type your reply..."></textarea>
          <button class="reply-compose-btn" onclick="sendReply('${(m.from||'').replace(/'/g,"\\'")}','${(m.subject||'').replace(/'/g,"\\'")}','${m.thread_id}','${id}','${(m._inbox||AM_INBOX).replace(/'/g,"\\'")}')">Send Reply</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleReply(id){
  const body=document.getElementById('rb_'+id);
  body&&body.classList.toggle('open');
}
function openReply(to,subj,tid,id){
  const compose=document.getElementById('compose_'+id);
  if(compose) compose.style.display=compose.style.display==='none'?'block':'none';
}
async function sendReply(to,subject,threadId,id,fromInbox){
  const text=document.getElementById('replytext_'+id)?.value?.trim();
  if(!text) return;
  const replySubject=subject.startsWith('Re:')?subject:'Re: '+subject;
  const inbox=fromInbox||AM_INBOX;
  try{
    await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/messages/send`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+AM_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({to:[to],subject:replySubject,text,thread_id:threadId})
    });
    toast('Reply sent ✓');
    document.getElementById('compose_'+id).style.display='none';
  }catch(e){toast('Send failed');}
}

async function updateStatus(leadId,status,btn){
  btn.disabled=true;btn.textContent='...';
  await sbPatch(`leads?id=eq.${leadId}`,{status});
  const lead=leads.find(l=>l.id===leadId);
  if(lead) lead.status=status;
  toast(`Marked as ${status}`);
  btn.disabled=false;
}

// ── LEAD PROFILE MODAL ──
async function showLead(id){
  currentLead=leads.find(l=>l.id===id);
  if(!currentLead) return;
  document.getElementById('modal-company').textContent=currentLead.company||currentLead.email;
  document.getElementById('modal-sub').textContent=(currentLead.industry||'')+(currentLead.location?' · '+currentLead.location:'');
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-body').innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">Loading...</div>`;

  const leadEmail=(currentLead.email||'').toLowerCase();

  // Load Supabase conversations
  const convos=await sbFetch(`conversations?lead_id=eq.${id}&order=sent_at.asc`);
  currentLead._convos=Array.isArray(convos)?convos:[];

  // Fetch full thread from ALL inboxes — match by from/to email
  const allInboxMsgs=await Promise.all(AM_INBOXES.map(inbox=>
    fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/messages?limit=100`,
      {headers:{'Authorization':'Bearer '+AM_KEY}})
    .then(r=>r.json())
    .then(d=>(d.messages||[]).map(m=>({...m,_inbox:inbox})))
    .catch(()=>[])
  ));

  const allMsgs=allInboxMsgs.flat();

  // Inbound: from the lead's email
  const inbound=allMsgs.filter(m=>{
    const fromAddr=(m.from||'').toLowerCase();
    return fromAddr.includes(leadEmail) && !(m.labels||[]).includes('sent');
  });

  // Outbound: sent from our inboxes, to the lead's email
  const outbound=allMsgs.filter(m=>{
    const toAddr=(m.to||[]).join(' ').toLowerCase()+(m.recipients||[]).join(' ').toLowerCase();
    return toAddr.includes(leadEmail) && ((m.labels||[]).includes('sent') || (m.labels||[]).includes('outbound'));
  });

  // Combine and sort chronologically
  const combined=[
    ...inbound.map(m=>({...m,_dir:'inbound'})),
    ...outbound.map(m=>({...m,_dir:'outbound'}))
  ].sort((a,b)=>new Date(a.timestamp||0)-new Date(b.timestamp||0));

  currentLead._thread=combined;
  currentLead._inbound=inbound;

  renderModalTab('profile');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  currentLead=null;
}

function modalTab(tab,el){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentModalTab=tab;
  renderModalTab(tab);
}

function renderModalTab(tab){
  const l=currentLead;
  if(!l) return;
  const body=document.getElementById('modal-body');

  if(tab==='profile'){
    const convos=l._convos||[];
    const inbound=convos.filter(c=>c.direction==='inbound');
    const wantsCall=inbound.some(c=>(c.body||'').toLowerCase().match(/call|phone|number|schedule|available/));
    body.innerHTML=`
      <div class="status-pills" style="margin-bottom:16px">
        ${['contacted','replied','booked','dead','bounced'].map(s=>
          `<div class="status-pill ${l.status===s?'active-pill':''}" onclick="updateStatusModal(${l.id},'${s}',this)">${s}</div>`
        ).join('')}
      </div>
      ${wantsCall?`<div class="call-req-card">
        <div class="call-req-tag">📞 Wants a Call</div>
        <div style="font-size:.82rem">This lead mentioned calling in their reply. Check conversations tab for their number/availability.</div>
      </div>`:''}
      <div class="profile-grid">
        <div class="profile-field"><div class="pf-label">Company</div><div class="pf-val">${l.company||'—'}</div></div>
        <div class="profile-field"><div class="pf-label">Contact</div><div class="pf-val">${l.name||'—'}</div></div>
        <div class="profile-field"><div class="pf-label">Email</div><div class="pf-val" style="font-size:.78rem;word-break:break-all">${l.email}</div></div>
        <div class="profile-field"><div class="pf-label">Industry</div><div class="pf-val">${l.industry||'—'}</div></div>
        <div class="profile-field"><div class="pf-label">Location</div><div class="pf-val">${l.location||'—'}</div></div>
        <div class="profile-field"><div class="pf-label">Status</div><div class="pf-val" style="color:${STATUS_COLORS[l.status]||'#fff'}">${l.status}</div></div>
        <div class="profile-field"><div class="pf-label">Contacted</div><div class="pf-val" style="font-size:.78rem">${l.contacted_at?new Date(l.contacted_at).toLocaleDateString('en-CA'):'—'}</div></div>
        <div class="profile-field"><div class="pf-label">Last Reply</div><div class="pf-val" style="font-size:.78rem">${l.last_reply_at?timeAgo(l.last_reply_at):'No reply yet'}</div></div>
      </div>
      ${l.notes?`<div class="profile-field" style="margin-bottom:12px"><div class="pf-label">Notes</div><div class="pf-val" style="font-size:.78rem;color:#aaa;font-weight:400">${l.notes}</div></div>`:''}
      <div class="reply-compose">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px">Quick Reply</div>
        <textarea id="modal-reply-text" placeholder="Type a reply..." rows="3"></textarea>
        <button class="reply-compose-btn" onclick="sendModalReply()">Send Reply</button>
      </div>`;
  }

  else if(tab==='conversations'){
    const thread=l._thread||[];
    const convos=l._convos||[];

    if(!thread.length&&!convos.length){
      body.innerHTML=`<div class="empty"><div class="empty-icon">💬</div>No emails found for ${l.email}</div>`;
      return;
    }

    const fmtTime=ts=>ts?new Date(ts).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';

    body.innerHTML=`
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:14px;display:flex;gap:12px">
        <span>${thread.length} emails in thread</span>
        <span style="color:var(--gold)">${(l._inbound||[]).length} replies from them</span>
      </div>

      ${thread.length?thread.map(m=>{
        const isIn=m._dir==='inbound';
        const name=(m.from||'').replace(/<.*>/,'').trim();
        const preview=m.body||m.preview||m.snippet||'';
        return`<div class="convo-msg ${isIn?'in':'out'}" style="margin-bottom:10px">
          <div class="convo-meta" style="margin-bottom:6px">
            <span class="convo-dir ${isIn?'in':'out'}">${isIn?'FROM THEM':'SENT'}</span>
            <span style="font-size:.72rem;color:var(--text);font-weight:600">${name}</span>
            ${!isIn?`<span style="font-size:.62rem;color:var(--muted)">via ${(m._inbox||'').split('@')[0]}</span>`:''}
            <span style="font-size:.62rem;color:var(--muted);margin-left:auto">${fmtTime(m.timestamp)}</span>
          </div>
          <div style="font-size:.78rem;font-weight:700;margin-bottom:5px;color:${isIn?'var(--gold)':'var(--text)'}">${m.subject||''}</div>
          <div style="font-size:.82rem;line-height:1.6;white-space:pre-wrap">${preview.slice(0,600)}${preview.length>600?'…':''}</div>
        </div>`;
      }).join(''):''}

      ${convos.length?`
        <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 0 8px">CRM LOG</div>
        ${convos.map(c=>`
          <div class="convo-msg ${c.direction==='outbound'?'out':'in'}" style="margin-bottom:8px">
            <div class="convo-meta"><span class="convo-dir ${c.direction==='outbound'?'out':'in'}">${c.direction.toUpperCase()}</span>${fmtTime(c.sent_at)}</div>
            <div style="font-size:.78rem;font-weight:600;margin-bottom:3px">${c.subject||''}</div>
            <div style="font-size:.82rem">${(c.body||'').slice(0,300)}</div>
          </div>`).join('')}`:''}

      <div class="reply-compose" style="margin-top:16px">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px">Reply to ${l.email}</div>
        <textarea id="conv-reply-text" placeholder="Type your reply..." rows="4"></textarea>
        <button class="reply-compose-btn" onclick="sendConvReply()">Send Reply</button>
      </div>`;
  }

  else if(tab==='analytics'){
    const convos=l._convos||[];
    const inbound=(l._inbound||[]).length+convos.filter(c=>c.direction==='inbound').length;
    const outbound=(l._thread||[]).filter(m=>m._dir==='outbound').length+convos.filter(c=>c.direction==='outbound').length;
    const daysSince=l.contacted_at?Math.round((Date.now()-new Date(l.contacted_at))/(86400000)):0;
    const wantsCall=(l._inbound||[]).some(r=>(r.preview||r.body||'').toLowerCase().match(/call|phone|number|schedule/));
    const callText=(l._inbound||[]).find(r=>(r.preview||r.body||'').toLowerCase().match(/call|phone|number|schedule/))?.preview||'';
    body.innerHTML=`
      <div class="analytics-row">
        <div class="analytics-stat"><div class="analytics-val" style="color:var(--gold)">${inbound}</div><div class="analytics-lbl">Replies Received</div></div>
        <div class="analytics-stat"><div class="analytics-val">${outbound}</div><div class="analytics-lbl">Emails Sent</div></div>
        <div class="analytics-stat"><div class="analytics-val">${daysSince}</div><div class="analytics-lbl">Days Since Contact</div></div>
      </div>
      <div class="analytics-row">
        <div class="analytics-stat"><div class="analytics-val" style="color:${STATUS_COLORS[l.status]||'#fff'}">${l.status}</div><div class="analytics-lbl">Current Status</div></div>
        <div class="analytics-stat"><div class="analytics-val">${l.follow_up_count||0}</div><div class="analytics-lbl">Follow-ups Sent</div></div>
      </div>
      ${wantsCall?`
      <div class="call-req-card">
        <div class="call-req-tag">📞 Call Requested</div>
        <div style="font-size:.82rem;margin-bottom:8px">${callText.slice(0,300)}</div>
        <button class="r-btn green" style="max-width:180px" onclick="updateStatusModal(${l.id},'booked',this);addCallFromLead('${(l.company||'').replace(/'/g,"\\'")}')">✅ Mark as Booked</button>
      </div>`:'<div style="font-size:.82rem;color:var(--muted);padding:20px;text-align:center">No call request detected in replies</div>'}`;
  }
}

async function updateStatusModal(leadId,status,el){
  await sbPatch(`leads?id=eq.${leadId}`,{status});
  const lead=leads.find(l=>l.id===leadId);
  if(lead) lead.status=status;
  document.querySelectorAll('.status-pill').forEach(p=>p.classList.remove('active-pill'));
  el.classList.add('active-pill');
  toast(`Status: ${status}`);
}

function addCallFromLead(company){
  calls.unshift({text:`Call with ${company}`,done:false,added:new Date().toISOString()});
  localStorage.setItem('wr_calls',JSON.stringify(calls));
  toast('Added to calls list');
}

async function sendModalReply(){
  const l=currentLead;
  if(!l) return;
  const text=document.getElementById('modal-reply-text')?.value?.trim();
  if(!text) return;
  await _sendReplyToLead(l,text,'modal-reply-text');
}

async function sendConvReply(){
  const l=currentLead;
  if(!l) return;
  const text=document.getElementById('conv-reply-text')?.value?.trim();
  if(!text) return;
  await _sendReplyToLead(l,text,'conv-reply-text');
}

async function _sendReplyToLead(l,text,inputId){
  // Find which inbox we originally sent from, or use jack@ as default
  const sentMsg=(l._thread||[]).find(m=>m._dir==='outbound');
  const inbox=sentMsg?sentMsg._inbox:AM_INBOX;
  // Find thread_id from inbound reply if available
  const threadId=(l._inbound||[])[0]?.thread_id||(l._thread||[])[0]?.thread_id||undefined;
  const lastInboundSubj=(l._inbound||[])[0]?.subject||'';
  const subject=lastInboundSubj?`Re: ${lastInboundSubj.replace(/^Re:\s*/i,'')}`:'Re: Following up — Wildrose Automations';
  try{
    await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/messages/send`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+AM_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({to:[l.email],subject,text,thread_id:threadId})
    });
    toast('Sent from '+inbox.split('@')[0]+' ✓');
    const el=document.getElementById(inputId);
    if(el) el.value='';
  }catch(e){toast('Send failed');}
}

// ── CALLS ──
function renderCalls(){
  const el=document.getElementById('callList');
  const booked=leads.filter(l=>l.status==='booked');
  if(!calls.length&&!booked.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📞</div>No calls scheduled</div>`;return;}
  el.innerHTML=`
    ${booked.length?`<div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--green);margin-bottom:8px">Booked from CRM (${booked.length})</div>`:''}
    ${booked.map(l=>`
      <div class="call-card" style="border-color:rgba(34,197,94,.3);margin-bottom:8px;cursor:pointer" onclick="showLead(${l.id})">
        <div class="call-dot done"></div>
        <div class="call-info"><div class="call-name">${l.company||l.email}</div><div class="call-detail">${l.name||''} · Status: booked</div></div>
        <div style="font-size:.7rem;color:var(--green)">Booked ✓</div>
      </div>`).join('')}
    ${calls.length?`<div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;margin-top:${booked.length?'12px':'0'}">Manual Calls</div>`:''}
    ${calls.map((c,i)=>`
      <div class="call-card ${c.done?'done':''}" style="margin-bottom:8px">
        <div class="call-dot ${c.done?'done':''}"></div>
        <div class="call-info"><div class="call-name">${c.text}</div><div class="call-detail">${c.added?new Date(c.added).toLocaleDateString('en-CA'):''}</div></div>
        <div class="call-acts">
          ${!c.done?`<button class="call-act done-act" onclick="markCallDone(${i})">✓</button>`:''}
          <button class="call-act" onclick="removeCall(${i})">✕</button>
        </div>
      </div>`).join('')}`;
}

function addCall(){
  const input=document.getElementById('callInput');
  const text=input.value.trim();if(!text)return;
  calls.unshift({text,done:false,added:new Date().toISOString()});
  localStorage.setItem('wr_calls',JSON.stringify(calls));
  input.value='';renderCalls();
}
function markCallDone(i){calls[i].done=true;localStorage.setItem('wr_calls',JSON.stringify(calls));renderCalls();}
function removeCall(i){calls.splice(i,1);localStorage.setItem('wr_calls',JSON.stringify(calls));renderCalls();}

function timeAgo(iso){
  if(!iso)return'';
  const diff=(Date.now()-new Date(iso))/1000;
  if(diff<3600)return Math.round(diff/60)+'m ago';
  if(diff<86400)return Math.round(diff/3600)+'h ago';
  return Math.round(diff/86400)+'d ago';
}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

(async()=>{await loadAll();renderDash();renderCalls();})();
</script>
