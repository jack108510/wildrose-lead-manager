<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildrose — Campaign Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #05050a;
    --card: #0f0f18;
    --border: #1a1a2e;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.15);
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --purple: #a855f7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    height: 52px;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  nav { display: flex; gap: 2px; flex: 1; }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: var(--text); background: var(--border); }
  .tab-btn.active { color: var(--accent); background: var(--accent-dim); }

  .badge {
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
    line-height: 14px;
  }

  .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .sync-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 5px 12px; border-radius: 6px;
    cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PAGES */
  .page { display: none; padding: 20px; flex: 1; }
  .page.active { display: block; }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-sub { color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* TWO-COL LAYOUT */
  .two-col { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  /* SECTION */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .section-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* RECENT SENDS */
  .send-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .send-row:last-child { border-bottom: none; }
  .send-row:hover { background: rgba(255,255,255,0.02); }
  .send-company { font-weight: 500; color: var(--text); }
  .send-email { color: var(--muted); font-size: 12px; }
  .send-time { color: var(--muted); font-size: 11px; white-space: nowrap; }

  /* STATUS PILLS */
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .pill-contacted { background: rgba(59,130,246,0.15); color: #3b82f6; }
  .pill-replied { background: rgba(168,85,247,0.15); color: #a855f7; }
  .pill-booked { background: rgba(34,197,94,0.15); color: #22c55e; }
  .pill-bounced { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .pill-dead { background: rgba(100,116,139,0.15); color: #64748b; }

  /* INDUSTRY BARS */
  .industry-row { padding: 10px 16px; }
  .industry-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-size: 12px;
  }
  .industry-name { color: var(--text); }
  .industry-count { color: var(--muted); }
  .bar-track { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.6s ease; }

  /* INBOX */
  .inbox-list { display: flex; flex-direction: column; gap: 0; }

  .email-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .email-card:first-child { border-radius: 10px 10px 0 0; }
  .email-card:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
  .email-card:only-child { border-radius: 10px; }
  .email-card:hover { background: #12121e; }
  .email-card.unread { border-left: 3px solid var(--accent); }

  .email-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .email-sender { font-weight: 600; color: var(--text); }
  .email-company-tag {
    font-size: 11px; color: var(--accent); background: var(--accent-dim);
    padding: 1px 6px; border-radius: 4px;
  }
  .email-inbox-tag {
    font-size: 10px; color: var(--muted); background: var(--border);
    padding: 1px 6px; border-radius: 4px; margin-left: auto;
  }
  .email-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .email-subject { font-weight: 500; color: var(--text); margin-bottom: 3px; font-size: 13px; }
  .email-preview { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

  .email-expanded {
    display: none;
    padding: 14px 16px;
    background: #08080f;
    border-top: 1px solid var(--border);
  }
  .email-expanded.open { display: block; }
  .email-body-text {
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 14px;
  }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

  /* REPLY COMPOSER */
  .reply-composer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .reply-composer textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    margin-bottom: 8px;
  }
  .reply-composer textarea:focus { border-color: var(--accent); }
  .reply-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .reply-from { font-size: 11px; color: var(--muted); }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-success { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .btn-success:hover { background: rgba(34,197,94,0.25); }
  .btn-purple { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
  .btn-purple:hover { background: rgba(168,85,247,0.25); }
  .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* CONTACTS */
  .filter-bar { display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .filter-btn {
    background: none; border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted); padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .search-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .contacts-layout { display: grid; grid-template-columns: 1fr; gap: 0; }
  .contacts-layout.with-panel { grid-template-columns: 1fr 380px; }

  .contacts-table { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 16px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }
  tr.selected td { background: var(--accent-dim); }

  /* CONTACT PANEL */
  .contact-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 120px);
    position: sticky;
    top: 72px;
  }
  .panel-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .panel-company { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .panel-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .meta-tag {
    font-size: 11px; color: var(--muted); background: var(--border);
    padding: 2px 8px; border-radius: 4px;
  }
  .panel-body { flex: 1; overflow-y: auto; }
  .panel-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .panel-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
  .panel-notes { color: var(--text); font-size: 13px; line-height: 1.5; }

  .thread-msg {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .thread-msg-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .thread-msg-from { font-weight: 500; font-size: 12px; }
  .thread-msg-time { font-size: 11px; color: var(--muted); }
  .thread-msg-subject { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .thread-msg-body { font-size: 12px; color: var(--text); line-height: 1.5; white-space: pre-wrap; max-height: 100px; overflow: hidden; position: relative; }
  .thread-msg-body.expanded { max-height: none; }

  /* COMPOSE */
  .compose-card {
    max-width: 680px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .compose-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select { appearance: none; cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 160px; line-height: 1.6; }

  /* LOADING / EMPTY */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  /* TOAST */
  #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
  .toast {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; font-size: 13px; color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: slideIn 0.2s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
    .contacts-layout.with-panel { grid-template-columns: 1fr; }
    .contact-panel { position: static; max-height: none; }
    .send-row { grid-template-columns: 1fr auto; }
    .send-email, .send-time { display: none; }
  }
</style>
</head>

// ── UTILS ──────────────────────────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-CA');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-CA');
}

function pillHtml(status) {
  const s = (status || 'contacted').toLowerCase();
  return `<span class="pill pill-${s}">${s}</span>`;
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DATA API (via n8n — no Supabase keys in frontend) ─────────────────────
async function apiCall(action, extra = {}) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...extra })
  });
  const json = await res.json();
  return json.data;
}

async function loadLeads() {
  const data = await apiCall('get_leads');
  leads = Array.isArray(data) ? data : (data ? [data] : []);
  return leads;
}

async function updateLeadStatus(id, status) {
  await apiCall('update_lead', { id, updates: { status, last_reply_at: new Date().toISOString() } });
  const l = leads.find(x => x.id === id);
  if (l) l.status = status;
}

async function logSentEmail(toEmail, toName, company, subject) {
  let lead = leads.find(l => l.email && l.email.toLowerCase() === toEmail.toLowerCase());
  if (lead) {
    await apiCall('update_lead', { id: lead.id, updates: { status: 'contacted', contacted_at: new Date().toISOString() } });
    lead.status = 'contacted';
  } else {
    const created = await apiCall('add_lead', { lead: {
      name: toName || toEmail.split('@')[0], email: toEmail,
      company: company || '', status: 'contacted', contacted_at: new Date().toISOString()
    }});
    if (created) leads.unshift(Array.isArray(created) ? created[0] : created);
  }
}

// ── AGENTMAIL ──────────────────────────────────────────────────────────────
async function amFetch(inboxEmail, path, opts = {}) {
  const inboxId = inboxEmail.split('@')[0];
  const url = `https://api.agentmail.to/v0/inboxes/${inboxId}/threads` + (path || '');
  const res = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${AM_KEY}`,
      'Content-Type': 'application/json',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) throw new Error(`AM ${res.status}`);
  return res.json();
}

async function amSend(fromEmail, to, subject, body, inReplyTo = null) {
  const inboxId = fromEmail.split('@')[0];
  const payload = { to: [{ email: to }], subject, text: body };
  if (inReplyTo) payload.in_reply_to = inReplyTo;
  const res = await fetch(`https://api.agentmail.to/v0/inboxes/${inboxId}/messages`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${AM_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`AM send ${res.status}: ${t}`);
  }
  return res.json();
}

async function fetchInbox(inboxEmail) {
  try {
    const res = await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inboxEmail)}/messages?limit=100`, {
      headers: { 'Authorization': `Bearer ${AM_KEY}` }
    });
    if (!res.ok) return [];
    const data = await res.json();
    const messages = Array.isArray(data) ? data : (data.messages || data.items || []);
    return messages.map(m => ({ ...m, _inbox: inboxEmail }));
  } catch { return []; }
}

async function loadAllInboxes() {
  const results = await Promise.all(AM_INBOXES.map(fetchInbox));
  const all = results.flat();

  // Filter: only inbound (received label), exclude noise
  const inbound = all.filter(m => {
    const fromAddr = (m.from_address || m.from || '').toLowerCase();
    const labels = (m.labels || []).map(l => (typeof l === 'string' ? l : l.name || '').toLowerCase());
    const hasReceived = labels.includes('received') || labels.includes('inbox');
    const isNoise = fromAddr.includes('mailer-daemon') || fromAddr.includes('noreply') ||
                    fromAddr.includes('no-reply') || fromAddr.includes('wildroseautomations');
    return !isNoise && (hasReceived || m.direction === 'inbound' || (m.from_address && !AM_INBOXES.includes(fromAddr)));
  });

  // Sort newest first
  inbound.sort((a, b) => new Date(b.date || b.created_at || 0) - new Date(a.date || a.created_at || 0));
  return inbound;
}

async function toggleReplyCard(rid, idx) {
  const exp = document.getElementById(`re-${rid}`);
  const card = document.getElementById(`rc-${rid}`);
  const isOpen = exp.classList.contains('open');
  document.querySelectorAll('.email-expanded').forEach(e => e.classList.remove('open'));
  if (!isOpen) {
    exp.classList.add('open');
    if (replyMessages[idx]) replyMessages[idx]._read = true;
    card.classList.remove('unread');
    card.style.borderLeft = '';

    // Load full thread using thread_id — returns full text for every message
    const msg = replyMessages[idx];
    const threadId = msg.thread_id;
    const inbox = msg._inbox || AM_INBOXES[0];
    const fromEmail = (msg.from_address || (msg.from||'').match(/[\w.+-]+@[\w.-]+\.[a-z]{2,}/i)?.[0] || '').toLowerCase();
    const threadDiv = document.getElementById(`thread-${rid}`);
    if (threadDiv) {
      threadDiv.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:8px 0">Loading thread…</div>';
      try {
        // Fetch thread directly by thread_id — returns all messages with full text
        const res = await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/threads/${threadId}`, {
          headers: { 'Authorization': `Bearer ${AM_KEY}` }
        });
        const data = await res.json();
        const thread = (data.messages || []).sort((a,b) => new Date(a.timestamp||0) - new Date(b.timestamp||0));

        if (!thread.length) {
          threadDiv.innerHTML = '<div style="font-size:11px;color:var(--muted)">No messages found in thread</div>';
          return;
        }

        const fmtTime = ts => ts ? new Date(ts).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

        threadDiv.innerHTML = thread.map(m => {
          const mFrom = (m.from || '').toLowerCase();
          const isInbound = mFrom.includes(fromEmail) || (!mFrom.includes('wildroseautomations'));
          const sender = (m.from||'').replace(/<.*>/,'').trim() || mFrom;
          const body = m.text || m.extracted_text || m.preview || '';
          return `
            <div style="margin-bottom:12px;padding:12px;border-radius:8px;background:${isInbound?'#0d1a0d':'#0a0a14'};border:1px solid ${isInbound?'rgba(34,197,94,.2)':'rgba(59,130,246,.15)'}">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
                <span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:uppercase;background:${isInbound?'rgba(34,197,94,.15)':'rgba(59,130,246,.15)'};color:${isInbound?'#22c55e':'#3b82f6'}">${isInbound?'THEM':'YOU'}</span>
                <span style="font-size:11px;color:var(--text);font-weight:600">${escHtml(sender)}</span>
                <span style="font-size:11px;color:var(--muted);margin-left:auto">${fmtTime(m.timestamp)}</span>
              </div>
              ${m.subject ? `<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted)">${escHtml(m.subject)}</div>` : ''}
              <div style="font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text)">${escHtml(body.slice(0,2000))}${body.length>2000?'\n\n[truncated…]':''}</div>
            </div>`;
        }).join('');
      } catch(e) {
        threadDiv.innerHTML = `<div style="font-size:11px;color:var(--muted)">Error: ${escHtml(e.message)}</div>`;
      }
    }
  }
}

async function sendReplyFromReplies(rid, toEmail, subject, fromInbox, threadId, leadId) {
  const text = document.getElementById(`rt-${rid}`)?.value?.trim();
  if (!text) { toast('Write something first', 'error'); return; }
  const inbox = fromInbox || 'jack@wildroseautomations.ca';
  const replySubj = subject.startsWith('Re:') ? subject : 'Re: ' + subject;
  try {
    const inboxId = inbox.split('@')[0];
    const body = { to: [toEmail], subject: replySubj, text };
    if (threadId) body.thread_id = threadId;
    await fetch(`https://api.agentmail.to/v0/inboxes/${inboxId}/messages/send`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AM_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (leadId) await updateLeadStatus(parseInt(leadId), 'replied');
    toast('Reply sent ✓', 'success');
    document.getElementById(`rt-${rid}`).value = '';
  } catch(e) { toast('Send failed', 'error'); }
}

function renderInboxMessages() {
  if (inboxMessages.length === 0) {
    document.getElementById('inbox-content').innerHTML = '<div class="empty">No inbound messages</div>';
    return;
  }

  // Sort: replies (inbound from leads) first, then rest
  const sorted = [...inboxMessages].sort((a, b) => {
    const aFrom = (a.from_address || a.from || '').toLowerCase();
    const bFrom = (b.from_address || b.from || '').toLowerCase();
    const aIsReply = !aFrom.includes('wildroseautomations') && !aFrom.includes('mailer-daemon');
    const bIsReply = !bFrom.includes('wildroseautomations') && !bFrom.includes('mailer-daemon');
    if (aIsReply && !bIsReply) return -1;
    if (!aIsReply && bIsReply) return 1;
    return new Date(b.date||b.created_at||0) - new Date(a.date||a.created_at||0);
  });

  const replyCount = sorted.filter(m => {
    const from = (m.from_address || m.from || '').toLowerCase();
    return !from.includes('wildroseautomations') && !from.includes('mailer-daemon');
  }).length;

  const html = `
    ${replyCount > 0 ? `<div style="padding:8px 16px;background:#0a140a;border-bottom:1px solid rgba(34,197,94,.25);font-size:11px;font-weight:700;color:#22c55e;letter-spacing:.5px">
      📬 ${replyCount} LEAD REPL${replyCount===1?'Y':'IES'} — SHOWN FIRST
    </div>` : ''}
    <div class="inbox-list">` + sorted.map((msg, i) => {
    const fromName = msg.from_name || (msg.from||'').replace(/<.*>/,'').trim() || 'Unknown';
    const fromEmail = msg.from_address || (msg.from||'').match(/[\w.+-]+@[\w.-]+\.[a-z]{2,}/i)?.[0] || '';
    const lead = leads.find(l => l.email && l.email.toLowerCase() === fromEmail.toLowerCase());
    const company = lead ? (lead.company || '') : '';
    const subject = msg.subject || '(no subject)';
    const preview = (msg.text || msg.body_text || msg.snippet || '').slice(0, 120);
    const ts = timeAgo(msg.date || msg.created_at);
    const inboxShort = (msg._inbox || '').split('@')[0];
    const isUnread = !msg._read;
    const isReply = !fromEmail.includes('wildroseautomations') && !fromEmail.includes('mailer-daemon') && fromEmail !== '';
    const statusColor = lead ? ({'replied':'#f59e0b','booked':'#22c55e','dead':'#ef4444','contacted':'#3b82f6'}[lead.status]||'') : '';

    return `
      <div class="email-card ${isUnread ? 'unread' : ''}" id="email-card-${i}" onclick="toggleEmail(${i})" style="${isReply ? 'border-left:3px solid #22c55e;' : ''}">
        <div class="email-card-header">
          <span class="email-sender">${escHtml(fromName)}</span>
          ${isReply ? `<span style="font-size:10px;font-weight:700;background:rgba(34,197,94,.15);color:#22c55e;padding:1px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px">Reply</span>` : ''}
          ${company ? `<span class="email-company-tag">${escHtml(company)}</span>` : ''}
          ${lead && statusColor ? `<span style="font-size:10px;font-weight:700;color:${statusColor};text-transform:uppercase">${lead.status}</span>` : ''}
          <span class="email-inbox-tag">${escHtml(inboxShort)}</span>
          <span class="email-time">${ts}</span>
        </div>
        <div class="email-subject">${escHtml(subject)}</div>
        <div class="email-preview">${escHtml(preview)}</div>
      </div>
      <div class="email-expanded" id="email-exp-${i}">
        <div class="email-body-text">${escHtml(msg.text || msg.body_text || msg.body || '(no content)')}</div>
        ${lead ? `<div class="action-row">
          <button class="btn btn-purple" onclick="markLeadStatus(${i}, '${lead.id}', 'replied')">✓ Mark Replied</button>
          <button class="btn btn-success" onclick="markLeadStatus(${i}, '${lead.id}', 'booked')">📅 Booked</button>
          <button class="btn btn-danger" onclick="markLeadStatus(${i}, '${lead.id}', 'dead')">✗ Dead</button>
        </div>` : ''}
        <div class="reply-composer">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">
            Reply via <strong>${escHtml(msg._inbox || '')}</strong> → <strong>${escHtml(fromEmail)}</strong>
          </div>
          <textarea id="reply-body-${i}" placeholder="Write your reply…"></textarea>
          <div class="reply-footer">
            <button class="btn btn-primary" onclick="sendReply(${i})">Send Reply</button>
          </div>
        </div>
      </div>
    `;
  }).join('') + `</div>`;

  document.getElementById('inbox-content').innerHTML = html;
  // Re-map toggle to sorted array
  window._sortedInboxMsgs = sorted;
}

function toggleEmail(i) {
  const card = document.getElementById(`email-card-${i}`);
  const exp = document.getElementById(`email-exp-${i}`);
  const isOpen = exp.classList.contains('open');
  // Close all
  document.querySelectorAll('.email-expanded').forEach(e => e.classList.remove('open'));
  if (!isOpen) {
    exp.classList.add('open');
    inboxMessages[i]._read = true;
    card.classList.remove('unread');
    updateInboxBadge();
  }
}

async function markLeadStatus(msgIdx, leadId, status) {
  try {
    await updateLeadStatus(leadId, status);
    toast(`Marked as ${status}`, 'success');
    renderCampaigns();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

async function sendReply(i) {
  const msg = inboxMessages[i];
  const body = document.getElementById(`reply-body-${i}`).value.trim();
  if (!body) { toast('Write a reply first', 'error'); return; }
  const toEmail = msg.from_address || msg.from || '';
  const inbox = msg._inbox || AM_INBOXES[0];
  const subject = msg.subject ? `Re: ${msg.subject}` : 'Re: Your message';
  try {
    await amSend(inbox, toEmail, subject, body, msg.message_id);
    toast('Reply sent!', 'success');
    document.getElementById(`reply-body-${i}`).value = '';
    // Update lead status if found
    const lead = leads.find(l => l.email && l.email.toLowerCase() === toEmail.toLowerCase());
    if (lead && lead.status === 'replied') {
      // already replied, keep as is
    }
  } catch (e) {
    toast('Send failed: ' + e.message, 'error');
  }
}

// ── CONTACTS ──────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterContacts(document.getElementById('contact-search').value);
}

function filterContacts(search = '') {
  const q = search.toLowerCase();
  let filtered = leads.filter(l => {
    if (currentFilter !== 'all' && l.status !== currentFilter) return false;
    if (!q) return true;
    return (l.name || '').toLowerCase().includes(q) ||
           (l.email || '').toLowerCase().includes(q) ||
           (l.company || '').toLowerCase().includes(q) ||
           (l.industry || '').toLowerCase().includes(q);
  });
  renderContactsTable(filtered);
}

function renderContacts() {
  filterContacts(document.getElementById('contact-search').value);
}

function renderContactsTable(filtered) {
  if (filtered.length === 0) {
    document.getElementById('contacts-table-content').innerHTML = '<div class="empty">No contacts found</div>';
    return;
  }

  document.getElementById('contacts-table-content').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Email</th>
          <th>Industry</th>
          <th>Location</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(l => `
          <tr class="${selectedLead && selectedLead.id === l.id ? 'selected' : ''}" onclick="selectLead('${l.id}')">
            <td><strong>${escHtml(l.company || '—')}</strong>${l.name ? `<div style="font-size:11px;color:var(--muted)">${escHtml(l.name)}</div>` : ''}</td>
            <td style="color:var(--muted)">${escHtml(l.email)}</td>
            <td style="color:var(--muted)">${escHtml(l.industry || '—')}</td>
            <td style="color:var(--muted)">${escHtml(l.location || '—')}</td>
            <td>${pillHtml(l.status)}</td>
            <td style="color:var(--muted)">${formatDate(l.contacted_at)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-name">${escHtml(selectedLead.name || selectedLead.email)}</div>
      <div class="panel-company">${escHtml(selectedLead.company || '—')}</div>
      <div class="panel-meta">
        ${pillHtml(selectedLead.status)}
        ${selectedLead.industry ? `<span class="meta-tag">${escHtml(selectedLead.industry)}</span>` : ''}
        ${selectedLead.location ? `<span class="meta-tag">📍 ${escHtml(selectedLead.location)}</span>` : ''}
      </div>
    </div>
    <div class="panel-body">
      <div class="panel-section">
        <div class="panel-section-title">Contact Info</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${escHtml(selectedLead.email)}</div>
        <div style="font-size:12px;color:var(--muted)">Contacted: ${timeAgo(selectedLead.contacted_at)}</div>
        ${selectedLead.last_reply_at ? `<div style="font-size:12px;color:var(--muted)">Last reply: ${timeAgo(selectedLead.last_reply_at)}</div>` : ''}
      </div>
      ${selectedLead.notes ? `
      <div class="panel-section">
        <div class="panel-section-title">Notes</div>
        <div class="panel-notes">${escHtml(selectedLead.notes)}</div>
      </div>` : ''}
      <div class="panel-section">

          <button class="btn btn-purple btn-sm" onclick="quickStatus('replied')">Replied</button>
          <button class="btn btn-success btn-sm" onclick="quickStatus('booked')">Booked</button>
          <button class="btn btn-danger btn-sm" onclick="quickStatus('dead')">Dead</button>
        </div>
      </div>
      <div class="panel-section" id="thread-section">
        <div class="panel-section-title">Email Thread <span id="thread-loading" style="color:var(--muted);font-weight:400">(loading…)</span></div>
        <div id="thread-messages"></div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Reply</div>
        <div class="reply-composer">
          <div style="margin-bottom:8px">
            <select class="form-select" id="panel-reply-from" style="font-size:12px;padding:5px 8px">
              ${AM_INBOXES.map(i => `<option value="${i}">${i.split('@')[0]}</option>`).join('')}
            </select>
          </div>
          <input class="form-input" id="panel-reply-subject" placeholder="Subject" style="margin-bottom:8px;font-size:12px;padding:7px 10px">
          <textarea id="panel-reply-body" placeholder="Write your message…" style="min-height:80px"></textarea>
          <button class="btn btn-primary" onclick="sendPanelReply()">Send</button>
        </div>
      </div>
    </div>
    <div style="padding:10px;border-top:1px solid var(--border)">
      <button class="btn btn-ghost" onclick="closePanel()" style="width:100%;justify-content:center">Close</button>
    </div>
  `;

  layout.appendChild(panel);

  // Load thread
  loadThread(selectedLead.email);
  renderContacts();
}

async function loadThread(email) {
  try {
    // Find threads across all inboxes that involve this email
    const emailLower = email.toLowerCase();
    const allThreadResults = await Promise.all(AM_INBOXES.map(async inbox => {
      try {
        const res = await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(inbox)}/threads?limit=100`, {
          headers: { 'Authorization': `Bearer ${AM_KEY}` }
        });
        if (!res.ok) return [];
        const data = await res.json();
        return (data.threads || []).filter(t => {
          const senders = (t.senders || []).join(' ').toLowerCase();
          const recipients = (t.recipients || []).join(' ').toLowerCase();
          return senders.includes(emailLower) || recipients.includes(emailLower);
        }).map(t => ({ ...t, _inbox: inbox }));
      } catch { return []; }
    }));

    const matchedThreads = allThreadResults.flat();
    document.getElementById('thread-loading').textContent = `(${matchedThreads.length} thread${matchedThreads.length!==1?'s':''})`;
    const container = document.getElementById('thread-messages');

    if (matchedThreads.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted)">No email threads found for this contact</div>';
      return;
    }

    // Fetch full messages for each thread
    const allMessages = [];
    for (const t of matchedThreads) {
      try {
        const res = await fetch(`https://api.agentmail.to/v0/inboxes/${encodeURIComponent(t._inbox)}/threads/${t.thread_id}`, {
          headers: { 'Authorization': `Bearer ${AM_KEY}` }
        });
        if (!res.ok) continue;
        const data = await res.json();
        (data.messages || []).forEach(m => allMessages.push({ ...m, _inbox: t._inbox }));
      } catch {}
    }

    allMessages.sort((a, b) => new Date(a.timestamp || 0) - new Date(b.timestamp || 0));
    document.getElementById('thread-loading').textContent = `(${allMessages.length} message${allMessages.length!==1?'s':''})`;

    if (allMessages.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted)">No messages found</div>';
      return;
    }

    container.innerHTML = allMessages.map((m, i) => {
      const from = (m.from || 'Unknown');
      const isOutbound = (m.from || '').toLowerCase().includes('wildroseautomations');
      const body = m.text || m.extracted_text || m.preview || '';
      const fmtTime = ts => ts ? new Date(ts).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="thread-msg" style="${isOutbound ? 'border-left:2px solid var(--accent)' : 'border-left:2px solid #22c55e'}">
          <div class="thread-msg-header">
            <span class="thread-msg-from" style="color:${isOutbound?'var(--accent)':'#22c55e'}">${isOutbound?'YOU':'THEM'}</span>
            <span style="font-size:11px;color:var(--text);margin-left:4px">${escHtml(from.replace(/<.*>/,'').trim())}</span>
            <span class="thread-msg-time">${fmtTime(m.timestamp)}</span>
          </div>
          <div class="thread-msg-subject">${escHtml(m.subject || '')}</div>
          <div class="thread-msg-body" id="tmb-${i}" style="max-height:none">${escHtml(body)}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    const tl = document.getElementById('thread-loading');
    if (tl) tl.textContent = '(error)';
  }
}

function expandThread(id, fullText) {
  const el = document.getElementById(id);
  if (el) { el.textContent = fullText; el.nextElementSibling.remove(); }
}

async function quickStatus(status) {
  if (!selectedLead) return;
  try {
    await updateLeadStatus(selectedLead.id, status);
    selectedLead.status = status;
    toast(`Marked as ${status}`, 'success');
    renderContacts();
    // Re-render panel header pill
    const panelPill = document.querySelector('.panel-meta .pill');
    if (panelPill) { panelPill.className = `pill pill-${status}`; panelPill.textContent = status; }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

async function sendPanelReply() {
  if (!selectedLead) return;
  const from = document.getElementById('panel-reply-from').value;
  const subject = document.getElementById('panel-reply-subject').value.trim() || `Re: Your inquiry`;
  const body = document.getElementById('panel-reply-body').value.trim();
  if (!body) { toast('Write a message first', 'error'); return; }
  try {
    await amSend(from, selectedLead.email, subject, body);
    toast('Sent!', 'success');
    document.getElementById('panel-reply-body').value = '';
    await updateLeadStatus(selectedLead.id, 'contacted');
    loadThread(selectedLead.email);
  } catch (e) {
    toast('Send failed: ' + e.message, 'error');
  }
}

function closePanel() {
  selectedLead = null;
  document.getElementById('contacts-layout').classList.remove('with-panel');
  const panel = document.getElementById('contact-panel');
  if (panel) panel.remove();
  renderContacts();
}

// ── COMPOSE ────────────────────────────────────────────────────────────────
async function sendEmail() {
  const from = document.getElementById('compose-from').value;
  const to = document.getElementById('compose-to').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body = document.getElementById('compose-body').value.trim();
  const btn = document.getElementById('send-btn');
  const status = document.getElementById('send-status');

  if (!to || !subject || !body) { toast('Fill in all fields', 'error'); return; }
  if (!to.includes('@')) { toast('Invalid email address', 'error'); return; }

  btn.disabled = true;
  status.textContent = 'Sending…';

  try {
    await amSend(from, to, subject, body);
    await logSentEmail(to, '', '', subject);
    toast('Email sent!', 'success');
    status.textContent = '✓ Sent';
    document.getElementById('compose-to').value = '';
    document.getElementById('compose-subject').value = '';
    document.getElementById('compose-body').value = '';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
    status.textContent = '✗ Failed';
  } finally {
    btn.disabled = false;
  }
}

// ── REFRESH ────────────────────────────────────────────────────────────────
async function refreshAll() {
  toast('Refreshing…', 'info');
  inboxMessages = [];
  await loadLeads();
  if (activeTab === 'campaigns') renderCampaigns();
  else if (activeTab === 'replies') renderReplies();
  else if (activeTab === 'inbox') renderInbox();
  else if (activeTab === 'contacts') renderContacts();
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    await loadLeads();
    renderCampaigns();

    // Background: load inbox + update both badges
    loadAllInboxes().then(msgs => {
      inboxMessages = msgs;
      updateInboxBadge();
      // Update replies badge
      const replyMsgs = msgs.filter(m => {
        const from = (m.from_address || m.from || '').toLowerCase();
        return !from.includes('wildroseautomations') && !from.includes('mailer-daemon') && !from.includes('noreply');
      });
      const unread = replyMsgs.filter(m => !m._read).length;
      const badge = document.getElementById('replies-badge');
      badge.textContent = unread > 99 ? '99+' : unread;
      badge.style.display = unread > 0 ? 'inline-block' : 'none';
    }).catch(() => {});
  } catch (e) {
    toast('Failed to load data: ' + e.message, 'error');
    document.getElementById('recent-sends').innerHTML = `<div class="empty">Error: ${escHtml(e.message)}</div>`;
  }
}

init();
</script>
