<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildrose Lead Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --text: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --pending: #F59E0B;
      --approved: #10B981;
      --rejected: #6B7280;
      --followup: #F97316;
      --danger: #EF4444;
      --reply-blue: #3B82F6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── HEADER ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header-stats {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-stat strong {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .header-stat.pending strong { color: var(--pending); }
    .header-stat.approved strong { color: var(--approved); }
    .header-stat.followup strong { color: var(--followup); }

    /* ── SYNC REPLIES BUTTON ── */
    .btn-sync-replies {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--reply-blue);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn-sync-replies:hover { border-color: var(--reply-blue); background: #EFF6FF; }
    .btn-sync-replies:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── BANNER ── */
    #followup-banner {
      display: none;
      background: #FFFBEB;
      border-bottom: 1px solid #FDE68A;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      color: #92400E;
      align-items: center;
      gap: 8px;
    }

    #followup-banner.show { display: flex; }

    /* ── PENDING LEADS BANNER ── */
    #pending-leads-banner {
      display: none;
      background: #EFF6FF;
      border-bottom: 1px solid #BFDBFE;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      color: #1E40AF;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }
    #pending-leads-banner.show { display: flex; }
    #pending-leads-banner .dismiss-btn {
      font-size: 12px;
      cursor: pointer;
      color: #2563EB;
      background: none;
      border: 1px solid #93C5FD;
      border-radius: 5px;
      padding: 3px 10px;
      font-weight: 600;
      transition: background 0.12s;
    }
    #pending-leads-banner .dismiss-btn:hover { background: #DBEAFE; }

    /* ── NEW BADGE ── */
    .new-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: #2563EB;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .filter-count {
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
    }

    .filter-btn.active .filter-count { background: rgba(255,255,255,0.25); }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 12px;
    }

    /* ── LEAD CARD ── */
    .lead-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.12s;
    }

    .lead-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .lead-card.followup-due { border-left: 3px solid var(--followup); }
    .lead-card.status-approved { border-left: 3px solid var(--approved); }
    .lead-card.status-rejected { opacity: 0.55; }

    /* card top row */
    .card-header {
      padding: 14px 14px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-title-group { flex: 1; min-width: 0; }

    .business-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }

    .business-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: #EFF6FF;
      color: var(--accent);
      border: 1px solid #BFDBFE;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .business-city {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-pending { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }
    .badge-approved { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    .badge-rejected { background: #F3F4F6; color: #4B5563; border: 1px solid #D1D5DB; }
    .badge-followup { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }

    /* ── REPLY BADGE ── */
    .reply-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      background: #EFF6FF;
      color: var(--reply-blue);
      border: 1px solid #BFDBFE;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }
    .reply-badge:hover { background: #DBEAFE; border-color: var(--reply-blue); }
    .reply-badge.has-new {
      background: #2563EB;
      color: #fff;
      border-color: #2563EB;
    }

    /* card info rows */
    .card-info {
      padding: 0 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .info-row a { color: var(--accent); text-decoration: none; }
    .info-row a:hover { text-decoration: underline; }

    .info-icon { width: 14px; text-align: center; font-size: 11px; }

    .automation-angle {
      margin: 0 14px 10px;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* followup date */
    .followup-date {
      font-size: 11px;
      color: var(--followup);
      padding: 0 14px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* email section */
    .email-section {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    .email-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
    }

    .email-toggle:hover { color: var(--accent); }
    .email-toggle-label { font-weight: 500; display: flex; align-items: center; gap: 5px; }

    .chevron { transition: transform 0.2s; display: inline-block; font-size: 10px; }
    .email-expanded .chevron { transform: rotate(180deg); }

    .email-body { display: none; margin-top: 10px; }
    .email-body.open { display: block; }

    .email-subject-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .email-subject-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .email-subject-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .email-subject-input:focus { border-color: var(--accent); }

    .email-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      min-height: 120px;
      outline: none;
    }

    .email-textarea:focus { border-color: var(--accent); }

    /* card actions */
    .card-actions {
      padding: 10px 14px;
      display: flex;
      gap: 6px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-approve {
      background: var(--accent);
      color: #fff;
      flex: 1;
    }
    .btn-approve:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-reject {
      background: var(--card);
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-reject:hover:not(:disabled) { border-color: var(--rejected); color: var(--rejected); }

    .btn-followup {
      background: var(--card);
      color: var(--followup);
      border-color: #FDBA74;
    }
    .btn-followup:hover:not(:disabled) { background: #FFF7ED; }

    /* ── REPLIES SECTION ── */
    .replies-section {
      border-top: 1px solid var(--border);
    }

    .replies-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
      color: var(--reply-blue);
      font-weight: 500;
      padding: 10px 14px;
      user-select: none;
    }
    .replies-toggle:hover { background: #F0F7FF; }
    .replies-toggle-label { display: flex; align-items: center; gap: 5px; }

    .replies-panel { display: none; padding: 0 14px 12px; }
    .replies-panel.open { display: block; }

    .reply-thread {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .thread-msg {
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .thread-msg.sent {
      background: #EFF6FF;
      border-left: 3px solid var(--accent);
    }

    .thread-msg.received {
      background: #F0FDF4;
      border-left: 3px solid var(--approved);
    }

    .thread-msg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }

    .thread-msg-direction {
      font-weight: 600;
      font-size: 11px;
      color: var(--text-muted);
    }
    .thread-msg.sent .thread-msg-direction { color: var(--accent); }
    .thread-msg.received .thread-msg-direction { color: var(--approved); }

    .thread-msg-date {
      font-size: 10px;
      color: var(--text-muted);
    }

    .thread-msg-subject {
      font-weight: 600;
      font-size: 11px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .thread-msg-preview {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-empty {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 12px 0;
      font-style: italic;
    }

    /* compose box */
    .compose-trigger-btn {
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--reply-blue);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .compose-trigger-btn:hover { border-color: var(--reply-blue); background: #EFF6FF; }

    .compose-box {
      display: none;
      margin-top: 8px;
    }
    .compose-box.open { display: block; }

    .compose-subject-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .compose-subject-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .compose-subject-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .compose-subject-input:focus { border-color: var(--reply-blue); }

    .compose-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }
    .compose-textarea:focus { border-color: var(--reply-blue); }

    .compose-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .btn-send-reply {
      background: var(--reply-blue);
      color: #fff;
      padding: 6px 14px;
      border-radius: 5px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.12s;
    }
    .btn-send-reply:hover:not(:disabled) { background: #1D4ED8; }
    .btn-send-reply:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-cancel-reply {
      background: var(--card);
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
    }
    .btn-cancel-reply:hover { border-color: var(--text-muted); }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 13px; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      max-width: 300px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      animation: slideIn 0.18s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .toast-success { border-left: 3px solid var(--approved); }
    .toast-error { border-left: 3px solid var(--danger); }
    .toast-info { border-left: 3px solid var(--accent); }

    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* spinner */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .spinner-blue {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(37,99,235,0.3);
      border-top-color: var(--reply-blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* responsive */
    @media (max-width: 600px) {
      main { padding: 14px 16px; }
      .cards-grid { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      .header-stats { gap: 12px; }
    }

    @media (max-width: 420px) {
      .header-stat:last-child { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌹</div>
    Wildrose Lead Manager
  </div>
  <div class="header-stats">

    </div>
    <div class="header-stat approved">
      <strong id="stat-approved">0</strong> Sent

    <div class="header-stat followup">

    </div>
    <button class="btn-sync-replies" id="sync-replies-btn" onclick="syncReplies()">
      💬 Sync Replies

  </div>
</header>

<div id="followup-banner">

</div>

<div id="pending-leads-banner">

<main>

  <div class="cards-grid" id="cards-grid"></div>
  <div id="empty-state" style="display:none" class="empty-state">
    <div class="empty-state-icon">📭</div>
    <h3>No leads here</h3>
    <p>Try a different filter.</p>
  </div>
</main>

<div id="toast"></div>

const AGENTMAIL_INBOX = 'https://api.agentmail.to/v0/inboxes/wildroseautomations%40agentmail.to/messages';
const AGENTMAIL_SEND = 'https://api.agentmail.to/v0/inboxes/wildroseautomations%40agentmail.to/messages/send';

async function fetchInboxMessages() {
  const resp = await fetch(AGENTMAIL_INBOX, {
    headers: { 'Authorization': `Bearer ${AGENTMAIL_KEY}` }
  });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const data = await resp.json();
  // API may return array or { messages: [...] }
  return Array.isArray(data) ? data : (data.messages || data.items || []);
}

async function sendEmail(to, subject, text) {
  const resp = await fetch(AGENTMAIL_SEND, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${AGENTMAIL_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ to, subject, text }),
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API error ${resp.status}: ${err}`);
  }
  return resp;
}

// ─── REPLY SYNC ───────────────────────────────────────────────────────────────

function normalizeEmail(e) {
  if (!e) return '';
  // extract bare address from "Name <addr>" format
  const m = e.match(/<(.+?)>/);
  return (m ? m[1] : e).toLowerCase().trim();
}

async function syncReplies(silent = false) {
  const btn = document.getElementById('sync-replies-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-blue"></span> Syncing…';
  }

  try {
    const messages = await fetchInboxMessages();
    let newCount = 0;

    messages.forEach(msg => {
      const fromEmail = normalizeEmail(msg.from || msg.from_address || '');
      if (!fromEmail) return;

      const lead = leads.find(l => normalizeEmail(l.email) === fromEmail);
      if (!lead) return;

      const msgId = msg.id || msg.message_id || (msg.date + fromEmail);
      const leadReplies = replies[lead.id] || [];

      // avoid duplicates
      if (leadReplies.some(r => r.id === msgId)) return;

      const msgDate = msg.date || msg.created_at || msg.received_at || new Date().toISOString();
      const msgSubject = msg.subject || '(no subject)';
      const msgBody = msg.text || msg.body || msg.snippet || msg.preview || '';

      leadReplies.push({
        id: msgId,
        direction: 'received',
        date: msgDate,
        subject: msgSubject,
        body: msgBody,
      });

      replies[lead.id] = leadReplies;
      newCount++;
    });

    saveReplies();
    render();

    if (!silent) {
      if (newCount > 0) {
        toast(`${newCount} new repl${newCount === 1 ? 'y' : 'ies'} synced!`, 'success', '💬');
      } else {
        toast('No new replies found.', 'info', '💬');
      }
    } else if (newCount > 0) {
      toast(`${newCount} new repl${newCount === 1 ? 'y' : 'ies'}!`, 'info', '💬');
    }
  } catch(err) {
    if (!silent) toast(`Sync failed: ${err.message}`, 'error', '✕');
    console.error('Reply sync error:', err);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '💬 Sync Replies';
    }
  }
}

  setTimeout(() => {

    setTimeout(() => item.remove(), 200);

}

function getTodayISO() {
  return new Date().toISOString().split('T')[0];
}

function isFollowupDue(lead) {
  if (lead.status !== 'followup' && lead.status !== 'approved') return false;
  if (!lead.followupDate) return false;
  return lead.followupDate <= getTodayISO();
}

function countByStatus(status) {
  return leads.filter(l => l.status === status).length;
}

function countFollowupDue() {
  return leads.filter(l => isFollowupDue(l)).length;
}

function filteredLeads() {
  if (activeFilter === 'all') return leads.filter(l => l.status !== 'rejected');
  if (activeFilter === 'pending') return leads.filter(l => l.status === 'pending');
  if (activeFilter === 'approved') return leads.filter(l => l.status === 'approved');
  if (activeFilter === 'rejected') return leads.filter(l => l.status === 'rejected');
  if (activeFilter === 'followup') return leads.filter(l => isFollowupDue(l));
  return leads;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) {
    // try plain ISO date string
    const [y, m, day] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
  }
  return d.toLocaleString('en-CA', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderRepliesSection(lead) {
  const leadReplies = replies[lead.id] || [];
  const sentEmails = lead.status === 'approved' ? [{
    id: `sent-${lead.id}`,
    direction: 'sent',
    date: lead.sentAt || '',
    subject: lead.emailDraft ? lead.emailDraft.subject : '',
    body: lead.emailDraft ? lead.emailDraft.body : '',
  }] : [];

  // merge sent + received, sort by date
  const thread = [...sentEmails, ...leadReplies].sort((a, b) => {
    const da = a.date ? new Date(a.date) : new Date(0);
    const db = b.date ? new Date(b.date) : new Date(0);
    return da - db;
  });

  const threadHtml = thread.length === 0
    ? `<div class="thread-empty">No messages yet.</div>`
    : thread.map(msg => `
      <div class="thread-msg ${msg.direction}">
        <div class="thread-msg-header">
          <span class="thread-msg-direction">${msg.direction === 'sent' ? '→ Sent' : '← Reply'}</span>

        </div>
        <div class="thread-msg-subject">${escHtml(msg.subject || '')}</div>

      </div>

  // last reply subject for pre-fill
  const lastSubject = thread.length > 0 ? (thread[thread.length - 1].subject || '') : '';
  const reSubject = lastSubject.startsWith('Re:') ? lastSubject : `Re: ${lastSubject}`;

  return `
    <div class="replies-section" id="replies-section-${lead.id}">
      <div class="replies-toggle" onclick="toggleReplies(${lead.id})">
        <span class="replies-toggle-label">💬 Thread (${thread.length})</span>
        <span class="chevron" id="replies-chevron-${lead.id}">▾</span>
      </div>
      <div class="replies-panel" id="replies-panel-${lead.id}">
        <div class="reply-thread" id="reply-thread-${lead.id}">
          ${threadHtml}
        </div>
        <div style="display:flex; justify-content:flex-end;">
          <button class="compose-trigger-btn" onclick="toggleCompose(${lead.id})">✏️ Reply</button>
        </div>
        <div class="compose-box" id="compose-box-${lead.id}">
          <div class="compose-subject-row">
            <span class="compose-subject-label">Subject</span>
            <input class="compose-subject-input" id="compose-subject-${lead.id}" value="${escHtml(reSubject)}" />
          </div>
          <textarea class="compose-textarea" id="compose-body-${lead.id}" placeholder="Write your reply…"></textarea>
          <div class="compose-actions">
            <button class="btn-send-reply" id="compose-send-${lead.id}" onclick="sendReply(${lead.id})">📤 Send</button>
            <button class="btn-cancel-reply" onclick="toggleCompose(${lead.id})">Cancel</button>

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function sendReply(id) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;

  const subjectEl = document.getElementById(`compose-subject-${id}`);
  const bodyEl = document.getElementById(`compose-body-${id}`);
  const sendBtn = document.getElementById(`compose-send-${id}`);

  const subject = subjectEl?.value?.trim() || `Re: ${lead.name}`;
  const text = bodyEl?.value?.trim();

  if (!text) {
    toast('Please write a reply first.', 'error', '✕');
    return;
  }

  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span> Sending…';

  try {
    await sendEmail(lead.email, subject, text);

    // Add to local thread
    const msgId = `sent-reply-${id}-${Date.now()}`;
    const newMsg = {
      id: msgId,
      direction: 'sent',
      date: new Date().toISOString(),
      subject,
      body: text,
    };
    if (!replies[id]) replies[id] = [];
    replies[id].push(newMsg);
    saveReplies();

    toast(`Reply sent to ${lead.name}!`, 'success', '✓');
    render();

    // Re-open replies panel after render
    requestAnimationFrame(() => openReplies(id));
  } catch(err) {
    sendBtn.disabled = false;
    sendBtn.innerHTML = '📤 Send';
    toast(`Failed: ${err.message}`, 'error', '✕');
    console.error(err);
  }
}

async function approveLead(id) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;

  const subject = document.getElementById(`subject-${id}`)?.value || lead.emailDraft.subject;
  const body = document.getElementById(`body-${id}`)?.value || lead.emailDraft.body;

  const btn = document.getElementById(`approve-btn-${id}`);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending…';

  try {
    await sendEmail(lead.email, subject, body);
    lead.status = 'approved';
    lead.sentAt = new Date().toISOString();
    lead.emailDraft = { subject, body };
    saveLeads();
    render();
    toast(`Email sent to ${lead.name}!`, 'success', '✓');

    // Notify local API if this is a cron-sourced lead
    if (lead.isFromApi && lead.apiId) {
      fetch(`${LOCAL_API}/pending-leads/${lead.apiId}/approve`, { method: 'POST' })
        .catch(e => console.log('API notify failed (ok to ignore):', e.message));
    }
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = '✓ Approve & Send';
    toast(`Failed to send: ${err.message}`, 'error', '✕');
    console.error(err);
  }
}

function rejectLead(id) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  lead.status = 'rejected';
  lead.followupDate = null;
  saveLeads();
  render();
  toast(`${lead.name} marked as rejected.`, 'info', '✕');

  // Notify local API if this is a cron-sourced lead
  if (lead.isFromApi && lead.apiId) {
    fetch(`${LOCAL_API}/pending-leads/${lead.apiId}/reject`, { method: 'POST' })
      .catch(e => console.log('API notify failed (ok to ignore):', e.message));
  }
}

function followupLead(id) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  const date = new Date();
  date.setDate(date.getDate() + 3);
  lead.followupDate = date.toISOString().split('T')[0];
  if (lead.status === 'pending') lead.status = 'followup';
  saveLeads();
  render();
  toast(`Follow-up set for ${lead.name} in 3 days.`, 'info', '🗓');
}

const LOCAL_API = 'http://localhost:3457';
const PENDING_SEEN_KEY = 'wildrose_pending_seen_ids_v1';

function getSeenPendingIds() {
  try { return new Set(JSON.parse(localStorage.getItem(PENDING_SEEN_KEY) || '[]')); }
  catch(e) { return new Set(); }
}

function saveSeenPendingId(id) {
  const seen = getSeenPendingIds();

  localStorage.setItem(PENDING_SEEN_KEY, JSON.stringify([...seen]));
}

// Normalize leads from the cron API to match site's lead schema
function normalizePendingLead(apiLead) {
  const typeMap = {
    cleaning: 'Cleaning', detailing: 'Car Detailing', landscaping: 'Landscaping',
    hvac: 'HVAC', moving: 'Moving', junk: 'Junk Removal', painting: 'Painters',
    property: 'Property Mgmt', gym: 'Gym', salon: 'Barbershop', mobile: 'Mobile',
  };
  return {
    id: `api-${apiLead.id}`,
    name: apiLead.business_name || apiLead.name || 'Unknown',
    city: apiLead.city || 'Edmonton',
    type: typeMap[apiLead.type] || apiLead.type || 'Other',
    email: apiLead.email || '',
    website: (apiLead.website || '').replace(/^https?:\/\//, ''),
    angle: apiLead.automation_angle || apiLead.angle || '',
    status: 'pending',
    followupDate: null,
    apiId: String(apiLead.id),
    isFromApi: true,
    emailDraft: null,
  };
}

async function fetchPendingLeads() {
  try {
    const resp = await fetch(`${LOCAL_API}/pending-leads`, { signal: AbortSignal.timeout(4000) });
    if (!resp.ok) return;
    const apiLeads = await resp.json();
    if (!Array.isArray(apiLeads)) return;

    const pendingApiLeads = apiLeads.filter(l => l.status === 'pending');
    const existingIds = new Set(leads.map(l => l.id));
    const newLeads = [];

    pendingApiLeads.forEach(apiLead => {
      const normalized = normalizePendingLead(apiLead);
      if (!existingIds.has(normalized.id)) {
        normalized.emailDraft = getEmailDraft(normalized);
        leads.unshift(normalized); // add to top
        newLeads.push(normalized);
        existingIds.add(normalized.id);
      }
    });

    if (newLeads.length > 0) {
      saveLeads();
      render();
      // Show banner
      const banner = document.getElementById('pending-leads-banner');
      const countEl = document.getElementById('pending-leads-count-text');
      const newUnseen = newLeads.filter(l => !getSeenPendingIds().has(l.id));
      if (newUnseen.length > 0 && banner && countEl) {
        countEl.textContent = newUnseen.length;
        banner.classList.add('show');
        toast(`📥 ${newUnseen.length} new lead${newUnseen.length !== 1 ? 's' : ''} ready for review!`, 'info', '📥');
      }
    }
  } catch(e) {
    // Local API may not be available (e.g. viewing on mobile) — silent fail
    console.log('Pending leads API unavailable:', e.message);
  }
}

function dismissPendingBanner() {
  const banner = document.getElementById('pending-leads-banner');
  if (banner) banner.classList.remove('show');
  // Mark all api leads as seen
  leads.filter(l => l.isFromApi).forEach(l => saveSeenPendingId(l.id));
  // Switch to pending filter
  setFilter('pending');
}

// Fetch on load + every 2 minutes
fetchPendingLeads();
setInterval(fetchPendingLeads, 2 * 60 * 1000);

// ─── INIT ─────────────────────────────────────────────────────────────────────

render();
</script>
