<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Wildrose Lead Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    #counter { font-size: 0.85rem; color: var(--muted); }

    /* Card stack */
    #stack {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      position: absolute;
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 24px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      will-change: transform;
    }

    .card:active { cursor: grabbing; }

    .card.behind {
      transform: scale(0.95) translateY(12px);
      z-index: 0;
      pointer-events: none;
    }

    .card.top { z-index: 10; }

    /* Swipe feedback overlays */
    .swipe-label {
      position: absolute;
      top: 28px;
      font-size: 1.4rem;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 8px;
      border: 3px solid;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .label-nope { left: 20px; color: var(--red); border-color: var(--red); transform: rotate(-15deg); }
    .label-send { right: 20px; color: var(--green); border-color: var(--green); transform: rotate(15deg); }
    .label-save { top: auto; bottom: 28px; left: 50%; transform: translateX(-50%); color: var(--yellow); border-color: var(--yellow); }

    /* Card content */
    .card-type {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .card-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .card-city {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .card-email {
      font-size: 0.95rem;
      color: var(--blue);
      margin-bottom: 12px;
      word-break: break-all;
    }

    .card-website {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
      word-break: break-all;
    }

    .card-angle {
      font-size: 0.88rem;
      color: #aaa;
      background: #222;
      border-left: 3px solid #444;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Email preview */
    .email-preview {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.6;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 14px;
      white-space: pre-wrap;
    }

    .btn-regen {
      width: 100%;
      background: #222;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-regen:hover { background: #2a2a2a; }

    /* Action buttons */
    #actions {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 16px 20px 28px;
      flex-shrink: 0;
    }

    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .action-btn:hover { transform: scale(1.1); }
    .action-btn:active { transform: scale(0.95); }

    .btn-nope  { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-save  { background: rgba(234,179,8,0.15); color: var(--yellow); font-size: 1.2rem; }
    .btn-send  { background: rgba(34,197,94,0.15); color: var(--green); }

    /* Hint labels */
    #hints {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 0 20px 10px;
      flex-shrink: 0;
    }
    .hint { font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* Empty state */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }
    #empty .icon { font-size: 3rem; }
    #empty p { font-size: 1rem; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* Saved drawer */
    #savedBtn {
      position: fixed;
      top: 16px;
      right: 20px;
      background: rgba(234,179,8,0.15);
      color: var(--yellow);
      border: 1px solid rgba(234,179,8,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Sending overlay */
    .sending-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--green);
      z-index: 20;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #444;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>🌹 Lead Manager</h1>
  <span id="counter">Loading...</span>
</header>

<div id="stack">
  <div id="empty">
    <div class="icon">🎉</div>
    <p>All caught up — no pending leads</p>
  </div>
</div>

<div id="hints">
  <div class="hint">← Skip</div>
  <div class="hint">↑ Save</div>
  <div class="hint">→ Send</div>
</div>

<div id="actions">
  <button class="action-btn btn-nope" onclick="swipeAction('left')" title="Skip">✕</button>
  <button class="action-btn btn-save" onclick="swipeAction('up')" title="Save for later">🔖</button>
  <button class="action-btn btn-send" onclick="swipeAction('right')" title="Send email">✉</button>
</div>

<div id="toast"></div>

<script>
const AGENTMAIL_TOKEN = 'am_us_237687733d6087d5e2e5c3956f651883c8b190d38b855ebdbcf85f6780a8c3c9';
const AGENTMAIL_INBOX = 'wildroseautomations@agentmail.to';
const LEADS_URL = 'https://raw.githubusercontent.com/jack108510/jsw-dashboard/main/wildrose-pending-leads.json';

let leads = [];
let currentIndex = 0;
let isDragging = false;
let startX = 0, startY = 0, currentX = 0, currentY = 0;
let cardEl = null;

function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function getEmailTemplate(lead) {
  const name = lead.first_name || 'there';
  const biz = lead.business_name || 'your business';
  const type = (lead.type || '').toLowerCase();
  const city = lead.city || 'Edmonton';

  const templates = {
    cleaning: `Hi ${name},\n\nMost cleaning companies in ${city} are losing 3–5 bookings a week and don't even realize it — leads come in through the website, no one follows up fast enough, and they book someone else.\n\nWe built an automation system specifically for cleaning companies that responds to new leads in under 60 seconds, answers their questions, and books the job — without anyone on your team lifting a finger.\n\nA residential cleaning company in Calgary using this added $3,800/month in booked jobs within their first 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    hvac: `Hi ${name},\n\nMost HVAC companies in ${city} are losing 3–5 service calls a week and don't even realize it — quote requests come in after hours, no one gets back to them, and they call the next company on the list.\n\nWe built an automation system specifically for HVAC companies that responds to new leads in under 60 seconds, qualifies the job, and gets it booked — even while your team is on a call or off the clock.\n\nAn HVAC company in Calgary using this recovered $5,200/month in jobs they were previously losing to slower competitors.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    painting: `Hi ${name},\n\nMost painting contractors in ${city} are losing 3–5 quotes a week and don't even realize it — someone fills out the form, doesn't hear back fast enough, and goes with whoever responds first.\n\nWe built an automation system specifically for painters and contractors that responds to new quote requests in under 60 seconds, asks the qualifying questions, and locks in the appointment — without you doing a thing.\n\nA painting company in Edmonton using this added $4,200/month in new jobs within 30 days of turning it on.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    detailing: `Hi ${name},\n\nMost detail shops in ${city} are losing 3–5 bookings a week without realizing it — people reach out, get no quick response, and book somewhere else.\n\nWe built an automation system for detail shops that responds to new inquiries in under 60 seconds, handles the back-and-forth, and locks in the booking automatically.\n\nA mobile detailing company using this added $2,900/month in new bookings within the first month.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    landscaping: `Hi ${name},\n\nMost landscaping companies in ${city} lose work every season the same way — quote requests pile up, follow-up is slow, and the client goes with whoever gets back to them first.\n\nWe built an automation system for landscaping companies that responds to new leads instantly, sends quote reminders automatically, and keeps your schedule full — without the admin work.\n\nA lawn care company using this added $3,500/month in recurring clients within 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    moving: `Hi ${name},\n\nMost moving companies in ${city} lose 40–50% of their leads to one thing: slow response time. Someone requests a quote, doesn't hear back within an hour, and books the next company.\n\nWe built an automation system for movers that responds to every quote request in under 60 seconds, qualifies the move, and gets the booking confirmed — automatically.\n\nA ${city} moving company using this recovered $4,800/month in jobs they were losing to faster competitors.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
  };

  return templates[type] || `Hi ${name},\n\nMost local service businesses in ${city} are losing jobs every week the same way — leads come in, follow-up is too slow, and the customer books someone else.\n\nWe build automation systems that respond to new leads in under 60 seconds, handle the qualifying questions, and lock in the booking — without anyone on your team doing the work.\n\nClients typically recover 3–5 lost jobs per week within the first 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`;
}

function getSubject(lead) {
  return `${lead.business_name} — quick question`;
}

async function loadLeads() {
  try {
    // Try GitHub first, fallback to local storage
    let data = localStorage.getItem('wildrose_leads');
    if (data) {
      leads = JSON.parse(data).filter(l => l.status === 'pending');
    } else {
      leads = [];
    }
  } catch(e) {
    leads = [];
  }
  renderStack();
  updateCounter();
}

function saveLead(lead) {
  let all = JSON.parse(localStorage.getItem('wildrose_leads') || '[]');
  const idx = all.findIndex(l => l.id === lead.id);
  if (idx >= 0) all[idx] = lead;
  else all.push(lead);
  localStorage.setItem('wildrose_leads', JSON.stringify(all));
}

function updateCounter() {
  const pending = leads.filter(l => l.status === 'pending').length;
  document.getElementById('counter').textContent = `${pending} pending`;
}

function renderStack() {
  const stack = document.getElementById('stack');
  // Remove old cards
  stack.querySelectorAll('.card').forEach(c => c.remove());

  const pending = leads.filter(l => l.status === 'pending');
  if (pending.length === 0) {
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('hints').style.display = 'none';
    return;
  }

  document.getElementById('empty').style.display = 'none';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('hints').style.display = 'flex';

  // Render top 2 cards
  for (let i = Math.min(1, pending.length - 1); i >= 0; i--) {
    const lead = pending[i];
    const card = buildCard(lead, i === 0);
    stack.appendChild(card);
  }

  // Attach drag to top card
  const topCard = stack.querySelector('.card.top');
  if (topCard) attachDrag(topCard, pending[0]);
}

function buildCard(lead, isTop) {
  const card = document.createElement('div');
  card.className = 'card ' + (isTop ? 'top' : 'behind');
  card.dataset.id = lead.id;

  const email = getEmailTemplate(lead);

  card.innerHTML = `
    <div class="swipe-label label-nope">Skip</div>
    <div class="swipe-label label-send">Send ✓</div>
    <div class="swipe-label label-save">Save Later</div>
    <div class="card-type">${lead.type || 'business'}</div>
    <div class="card-name">${lead.business_name || 'Unknown Business'}</div>
    <div class="card-city">📍 ${lead.city || 'Edmonton'}</div>
    <div class="card-email">✉ ${lead.email}</div>
    ${lead.website ? `<div class="card-website">🌐 ${lead.website}</div>` : ''}
    ${lead.automation_angle ? `<div class="card-angle">${lead.automation_angle}</div>` : ''}
    <div class="email-preview" id="preview-${lead.id}">${email}</div>
    <button class="btn-regen" onclick="regenEmail('${lead.id}')">↻ Regenerate Email</button>
  `;

  return card;
}

function regenEmail(id) {
  const lead = leads.find(l => l.id == id);
  if (!lead) return;
  const preview = document.getElementById('preview-' + id);
  if (preview) preview.textContent = getEmailTemplate(lead);
  toast('Email refreshed');
}

function attachDrag(card, lead) {
  let sx = 0, sy = 0, cx = 0, cy = 0;

  function onStart(e) {
    isDragging = true;
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX;
    sy = pt.clientY;
    card.style.transition = 'none';
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    cx = pt.clientX - sx;
    cy = pt.clientY - sy;
    const rot = cx * 0.08;
    card.style.transform = `translate(${cx}px, ${cy}px) rotate(${rot}deg)`;

    // Show labels
    const nope = card.querySelector('.label-nope');
    const send = card.querySelector('.label-send');
    const save = card.querySelector('.label-save');

    if (cy < -60 && Math.abs(cx) < 80) {
      save.style.opacity = Math.min(1, Math.abs(cy) / 100);
      nope.style.opacity = 0; send.style.opacity = 0;
    } else if (cx > 40) {
      send.style.opacity = Math.min(1, cx / 100);
      nope.style.opacity = 0; save.style.opacity = 0;
    } else if (cx < -40) {
      nope.style.opacity = Math.min(1, Math.abs(cx) / 100);
      send.style.opacity = 0; save.style.opacity = 0;
    } else {
      nope.style.opacity = 0; send.style.opacity = 0; save.style.opacity = 0;
    }
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    card.style.transition = 'transform 0.3s ease';

    if (cy < -80 && Math.abs(cx) < 100) {
      animateOut(card, 0, -window.innerHeight, () => completeAction(lead, 'saved'));
    } else if (cx > 100) {
      animateOut(card, window.innerWidth * 1.5, 0, () => completeAction(lead, 'sent'));
    } else if (cx < -100) {
      animateOut(card, -window.innerWidth * 1.5, 0, () => completeAction(lead, 'skipped'));
    } else {
      card.style.transform = '';
      card.querySelectorAll('.swipe-label').forEach(l => l.style.opacity = 0);
    }
  }

  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

function animateOut(card, tx, ty, callback) {
  card.style.transition = 'transform 0.4s ease';
  card.style.transform = `translate(${tx}px, ${ty}px) rotate(${tx > 0 ? 20 : -20}deg)`;
  setTimeout(() => {
    card.remove();
    callback();
  }, 400);
}

function swipeAction(dir) {
  const pending = leads.filter(l => l.status === 'pending');
  if (pending.length === 0) return;
  const lead = pending[0];
  const card = document.querySelector('.card.top');
  if (!card) return;

  if (dir === 'left') {
    animateOut(card, -window.innerWidth * 1.5, 0, () => completeAction(lead, 'skipped'));
  } else if (dir === 'right') {
    animateOut(card, window.innerWidth * 1.5, 0, () => completeAction(lead, 'sent'));
  } else if (dir === 'up') {
    animateOut(card, 0, -window.innerHeight, () => completeAction(lead, 'saved'));
  }
}

async function completeAction(lead, action) {
  if (action === 'sent') {
    await sendEmail(lead);
  } else if (action === 'saved') {
    lead.status = 'saved';
    saveLead(lead);
    leads = leads.map(l => l.id === lead.id ? lead : l);
    toast('💾 Saved for later');
  } else {
    lead.status = 'skipped';
    saveLead(lead);
    leads = leads.map(l => l.id === lead.id ? lead : l);
    toast('Skipped');
  }
  updateCounter();
  renderStack();
}

async function sendEmail(lead) {
  const emailBody = document.getElementById('preview-' + lead.id)?.textContent || getEmailTemplate(lead);
  const subject = getSubject(lead);

  // Show sending state
  toast('⏳ Sending email...', 5000);

  try {
    const resp = await fetch(
      `https://api.agentmail.to/v0/inboxes/${encodeURIComponent(AGENTMAIL_INBOX)}/messages/send`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${AGENTMAIL_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          to: lead.email,
          subject: subject,
          text: emailBody
        })
      }
    );

    if (resp.ok) {
      lead.status = 'sent';
      lead.sent_at = new Date().toISOString();
      saveLead(lead);
      leads = leads.map(l => l.id === lead.id ? lead : l);
      toast('✅ Email sent to ' + lead.email);
    } else {
      const err = await resp.text();
      console.error('Send failed:', err);
      lead.status = 'send_failed';
      saveLead(lead);
      leads = leads.map(l => l.id === lead.id ? lead : l);
      toast('❌ Send failed — lead skipped');
    }
  } catch (e) {
    console.error(e);
    toast('❌ Network error');
    lead.status = 'send_failed';
    saveLead(lead);
    leads = leads.map(l => l.id === lead.id ? lead : l);
  }

  updateCounter();
  renderStack();
}

// Load leads from the pending-leads file via fetch
async function init() {
  // First try to load from GitHub Pages data
  try {
    const resp = await fetch('https://jack108510.github.io/jsw-dashboard/wildrose-pending-leads.json?t=' + Date.now());
    if (resp.ok) {
      const fresh = await resp.json();
      // Merge with local (local statuses win)
      const local = JSON.parse(localStorage.getItem('wildrose_leads') || '[]');
      const localMap = {};
      local.forEach(l => localMap[l.id] = l);

      leads = fresh.map(l => localMap[l.id] || l);
      localStorage.setItem('wildrose_leads', JSON.stringify(leads));
    }
  } catch(e) {
    // Fall back to localStorage
    const data = localStorage.getItem('wildrose_leads');
    leads = data ? JSON.parse(data) : [];
  }

  leads = leads.filter(l => l.status === 'pending' || !l.status);
  renderStack();
  updateCounter();
}

init();
</script>
</body>
</html>
