<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Wildrose Lead Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    #counter { font-size: 0.85rem; color: var(--muted); }

    #stack {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .card {
      position: absolute;
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 22px 20px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card.behind {
      transform: scale(0.95) translateY(14px);
      z-index: 0;
      pointer-events: none;
    }
    .card.top { z-index: 10; }

    .swipe-label {
      position: absolute;
      font-size: 1.3rem;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 8px;
      border: 3px solid;
      opacity: 0;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.08s;
    }
    .label-nope { top: 24px; left: 18px; color: var(--red); border-color: var(--red); transform: rotate(-12deg); }
    .label-send { top: 24px; right: 18px; color: var(--green); border-color: var(--green); transform: rotate(12deg); }
    .label-save { bottom: 24px; left: 50%; transform: translateX(-50%); color: var(--yellow); border-color: var(--yellow); }

    .card-type {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      background: #222;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .card-name { font-size: 1.45rem; font-weight: 700; margin-bottom: 3px; line-height: 1.2; }
    .card-city { font-size: 0.88rem; color: var(--muted); margin-bottom: 14px; }
    .card-email { font-size: 0.92rem; color: var(--blue); margin-bottom: 8px; word-break: break-all; }
    .card-website { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; word-break: break-all; }
    .card-angle {
      font-size: 0.85rem;
      color: #aaa;
      background: #111;
      border-left: 3px solid #333;
      padding: 9px 12px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .email-preview {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.78rem;
      color: #999;
      line-height: 1.6;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .btn-regen {
      width: 100%;
      background: #222;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-regen:hover { background: #2a2a2a; }

    #hints {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 0 20px 8px;
      flex-shrink: 0;
    }
    .hint { font-size: 0.7rem; color: var(--muted); text-align: center; }

    #actions {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 12px 20px 28px;
      flex-shrink: 0;
    }
    .action-btn {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .action-btn:hover { transform: scale(1.1); }
    .action-btn:active { transform: scale(0.95); }
    .btn-nope { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-save { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .btn-send { background: rgba(34,197,94,0.15); color: var(--green); }

    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--muted);
      text-align: center;
    }
    #empty .icon { font-size: 3rem; }

    #toast {
      position: fixed;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.84rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>🌹 Lead Manager</h1>
  <span id="counter">Loading...</span>
</header>

<div id="stack">
  <div id="empty">
    <div class="icon">🎉</div>
    <p>All caught up — no pending leads</p>
  </div>
</div>

<div id="hints">
  <div class="hint">← Skip</div>
  <div class="hint">↑ Save</div>
  <div class="hint">→ Send ✉</div>
</div>

<div id="actions">
  <button class="action-btn btn-nope" onclick="swipeAction('left')" title="Skip">✕</button>
  <button class="action-btn btn-save" onclick="swipeAction('up')" title="Save for later">🔖</button>
  <button class="action-btn btn-send" onclick="swipeAction('right')" title="Send email">✉</button>
</div>

<div id="toast"></div>

<script>
const N8N_WEBHOOK = 'https://n8n.wildeautomations.com/webhook/wildrose-send-email';
const DATA_URL = 'https://jack108510.github.io/jsw-dashboard/wildrose-pending-leads.json';

let leads = [];

function toast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

function getTemplate(lead) {
  const name = lead.first_name || 'there';
  const biz = lead.business_name || 'your business';
  const type = (lead.type || '').toLowerCase();
  const city = lead.city || 'Edmonton';
  const templates = {
    cleaning: `Hi ${name},\n\nMost cleaning companies in ${city} are losing 3–5 bookings a week and don't even realize it — leads come in through the website, no one follows up fast enough, and they book someone else.\n\nWe built an automation system specifically for cleaning companies that responds to new leads in under 60 seconds, answers their questions, and books the job — without anyone on your team lifting a finger.\n\nA residential cleaning company in Calgary using this added $3,800/month in booked jobs within their first 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    hvac: `Hi ${name},\n\nMost HVAC companies in ${city} are losing 3–5 service calls a week and don't even realize it — quote requests come in after hours, no one gets back to them, and they call the next company on the list.\n\nWe built an automation system specifically for HVAC companies that responds to new leads in under 60 seconds, qualifies the job, and gets it booked — even while your team is on a call or off the clock.\n\nAn HVAC company in Calgary using this recovered $5,200/month in jobs they were previously losing to slower competitors.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    painting: `Hi ${name},\n\nMost painting contractors in ${city} are losing 3–5 quotes a week and don't even realize it — someone fills out the form, doesn't hear back fast enough, and goes with whoever responds first.\n\nWe built an automation system specifically for painters and contractors that responds to new quote requests in under 60 seconds, asks the qualifying questions, and locks in the appointment — without you doing a thing.\n\nA painting company in Edmonton using this added $4,200/month in new jobs within 30 days of turning it on.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    detailing: `Hi ${name},\n\nMost detail shops in ${city} are losing 3–5 bookings a week without realizing it — people reach out, get no quick response, and book somewhere else.\n\nWe built an automation system for detail shops that responds to new inquiries in under 60 seconds, handles the back-and-forth, and locks in the booking automatically.\n\nA mobile detailing company using this added $2,900/month in new bookings within the first month.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    landscaping: `Hi ${name},\n\nMost landscaping companies in ${city} lose work every season the same way — quote requests pile up, follow-up is slow, and the client goes with whoever gets back to them first.\n\nWe built an automation system for landscaping companies that responds to new leads instantly, sends quote reminders automatically, and keeps your schedule full — without the admin work.\n\nA lawn care company using this added $3,500/month in recurring clients within 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
    moving: `Hi ${name},\n\nMost moving companies in ${city} lose 40–50% of their leads to one thing: slow response time. Someone requests a quote, doesn't hear back within an hour, and books the next company.\n\nWe built an automation system for movers that responds to every quote request in under 60 seconds, qualifies the move, and gets the booking confirmed — automatically.\n\nA ${city} moving company using this recovered $4,800/month in jobs they were losing to faster competitors.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`,
  };
  return templates[type] || `Hi ${name},\n\nMost local service businesses in ${city} are losing jobs every week the same way — leads come in, follow-up is too slow, and the customer books someone else.\n\nWe build automation systems that respond to new leads in under 60 seconds, handle the qualifying questions, and lock in the booking — without anyone on your team doing the work.\n\nClients typically recover 3–5 lost jobs per week within the first 30 days.\n\nOpen to a 15-minute call this week to see if it's a fit for ${biz}?\n\nJack Wilde\nCEO, Wildrose Automations\nwildroseautomations.com`;
}

function saveLocal(lead) {
  let all = JSON.parse(localStorage.getItem('wrl') || '[]');
  const i = all.findIndex(l => l.id === lead.id);
  if (i >= 0) all[i] = lead; else all.push(lead);
  localStorage.setItem('wrl', JSON.stringify(all));
}

function updateCounter() {
  const p = leads.filter(l => !l.status || l.status === 'pending').length;
  document.getElementById('counter').textContent = `${p} pending`;
}

function pending() {
  return leads.filter(l => !l.status || l.status === 'pending');
}

function renderStack() {
  const stack = document.getElementById('stack');
  stack.querySelectorAll('.card').forEach(c => c.remove());
  const q = pending();
  if (q.length === 0) {
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('hints').style.display = 'none';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('hints').style.display = 'flex';

  // Render back card first (behind)
  if (q.length > 1) {
    stack.appendChild(buildCard(q[1], false));
  }
  // Top card
  const top = buildCard(q[0], true);
  stack.appendChild(top);
  attachDrag(top, q[0]);
}

function buildCard(lead, isTop) {
  const card = document.createElement('div');
  card.className = 'card ' + (isTop ? 'top' : 'behind');
  card.dataset.id = lead.id;
  const email = getTemplate(lead);
  card.innerHTML = `
    <div class="swipe-label label-nope">Skip</div>
    <div class="swipe-label label-send">Send ✓</div>
    <div class="swipe-label label-save">Save</div>
    <div class="card-type">${lead.type || 'business'}</div>
    <div class="card-name">${lead.business_name || 'Unknown'}</div>
    <div class="card-city">📍 ${lead.city || 'Edmonton'}</div>
    <div class="card-email">✉ ${lead.email}</div>
    ${lead.website ? `<div class="card-website">🌐 ${lead.website}</div>` : ''}
    ${lead.automation_angle ? `<div class="card-angle">${lead.automation_angle}</div>` : ''}
    <div class="email-preview" id="ep-${lead.id}">${email}</div>
    <button class="btn-regen" onclick="regen('${lead.id}')">↻ New Email Draft</button>
  `;
  return card;
}

function regen(id) {
  const lead = leads.find(l => l.id == id);
  if (!lead) return;
  const el = document.getElementById('ep-' + id);
  if (el) el.textContent = getTemplate(lead);
  toast('Refreshed');
}

function attachDrag(card, lead) {
  let sx = 0, sy = 0, cx = 0, cy = 0, dragging = false;

  function start(e) {
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    sx = p.clientX; sy = p.clientY;
    card.style.transition = 'none';
  }
  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    cx = p.clientX - sx; cy = p.clientY - sy;
    card.style.transform = `translate(${cx}px,${cy}px) rotate(${cx * 0.07}deg)`;
    const nope = card.querySelector('.label-nope');
    const send = card.querySelector('.label-send');
    const save = card.querySelector('.label-save');
    if (cy < -60 && Math.abs(cx) < 90) {
      save.style.opacity = Math.min(1, Math.abs(cy)/90);
      nope.style.opacity = 0; send.style.opacity = 0;
    } else if (cx > 40) {
      send.style.opacity = Math.min(1, cx/100);
      nope.style.opacity = 0; save.style.opacity = 0;
    } else if (cx < -40) {
      nope.style.opacity = Math.min(1, Math.abs(cx)/100);
      send.style.opacity = 0; save.style.opacity = 0;
    } else {
      nope.style.opacity = 0; send.style.opacity = 0; save.style.opacity = 0;
    }
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    card.style.transition = 'transform 0.3s ease';
    if (cy < -80 && Math.abs(cx) < 100) fly(card, 0, -window.innerHeight, () => act(lead, 'saved'));
    else if (cx > 100) fly(card, window.innerWidth * 1.5, 0, () => act(lead, 'sent'));
    else if (cx < -100) fly(card, -window.innerWidth * 1.5, 0, () => act(lead, 'skipped'));
    else { card.style.transform = ''; card.querySelectorAll('.swipe-label').forEach(l => l.style.opacity = 0); }
  }

  card.addEventListener('mousedown', start);
  card.addEventListener('touchstart', start, { passive: true });
  window.addEventListener('mousemove', move);
  window.addEventListener('touchmove', move, { passive: false });
  window.addEventListener('mouseup', end);
  window.addEventListener('touchend', end);
}

function fly(card, tx, ty, cb) {
  card.style.transition = 'transform 0.35s ease';
  card.style.transform = `translate(${tx}px,${ty}px) rotate(${tx > 0 ? 18 : -18}deg)`;
  setTimeout(() => { card.remove(); cb(); }, 350);
}

function swipeAction(dir) {
  const q = pending();
  if (!q.length) return;
  const lead = q[0];
  const card = document.querySelector('.card.top');
  if (!card) return;
  if (dir === 'left') fly(card, -window.innerWidth * 1.5, 0, () => act(lead, 'skipped'));
  else if (dir === 'right') fly(card, window.innerWidth * 1.5, 0, () => act(lead, 'sent'));
  else if (dir === 'up') fly(card, 0, -window.innerHeight, () => act(lead, 'saved'));
}

async function act(lead, action) {
  if (action === 'sent') {
    await sendEmail(lead);
  } else {
    lead.status = action;
    saveLocal(lead);
    leads = leads.map(l => l.id === lead.id ? lead : l);
    toast(action === 'saved' ? '🔖 Saved for later' : 'Skipped');
    updateCounter();
    renderStack();
  }
}

async function sendEmail(lead) {
  const body = document.getElementById('ep-' + lead.id)?.textContent || getTemplate(lead);
  const subject = `${lead.business_name} — quick question`;
  toast('⏳ Sending...', 6000);
  try {
    const r = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: lead.email, subject, text: body })
    });
    if (r.ok) {
      lead.status = 'sent';
      lead.sent_at = new Date().toISOString();
      toast('✅ Sent to ' + lead.email);
    } else {
      lead.status = 'send_failed';
      toast('❌ Send failed');
    }
  } catch(e) {
    lead.status = 'send_failed';
    toast('❌ Network error');
  }
  saveLocal(lead);
  leads = leads.map(l => l.id === lead.id ? lead : l);
  updateCounter();
  renderStack();
}

async function init() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (r.ok) {
      const fresh = await r.json();
      const local = JSON.parse(localStorage.getItem('wrl') || '[]');
      const lmap = {};
      local.forEach(l => lmap[l.id] = l);
      leads = fresh.map(l => lmap[l.id] || l);
      localStorage.setItem('wrl', JSON.stringify(leads));
    } else throw new Error('fetch failed');
  } catch(e) {
    leads = JSON.parse(localStorage.getItem('wrl') || '[]');
  }
  updateCounter();
  renderStack();
}

init();
</script>
</body>
</html>
